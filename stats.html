<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Uncle Group — Player Stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .ctab { font-size:12px; padding:6px 14px; border-radius:20px; border:0.5px solid #e5e7eb; cursor:pointer; font-weight:500; color:#6b7280; background:#fff; }
    .ctab.active { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
    .stat-card { background:#fff; border:0.5px solid #e5e7eb; border-radius:12px; padding:10px 14px; }
    /* player drawer */
    #statsDrawer { display:none; position:fixed; inset:0; z-index:50; }
    #statsDrawer.open { display:flex; }
    #statsBackdrop { position:absolute; inset:0; background:rgba(0,0,0,.35); }
    #statsPanel { position:absolute; right:0; top:0; bottom:0; width:100%; max-width:420px; background:#fff; display:flex; flex-direction:column; overflow:hidden; box-shadow:-4px 0 24px rgba(0,0,0,.1); }
    .spane { flex:1; overflow-y:auto; padding:16px 20px; }
    .stab-btn { font-size:12px; padding:8px 12px 8px 0; border-bottom:2px solid transparent; color:#6b7280; cursor:pointer; margin-right:8px; }
    .stab-btn.active { border-color:#1d4ed8; color:#1d4ed8; font-weight:500; }
    .sort-asc::after  { content:'↑'; margin-left:3px; }
    .sort-desc::after { content:'↓'; margin-left:3px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div class="max-w-4xl mx-auto p-4">

  <!-- Nav -->
  <nav class="flex items-center gap-1 mb-6 bg-white rounded-2xl shadow px-4 py-3">
    <span class="font-bold text-sm text-gray-800 mr-4">Uncle Group</span>
    <a href="index.html"   class="text-xs px-3 py-1.5 rounded-full text-gray-500 hover:bg-gray-100">💰 Expenses</a>
    <a href="cricket.html" class="text-xs px-3 py-1.5 rounded-full text-gray-500 hover:bg-gray-100">🏏 Scoring App</a>
    <a href="stats.html"   class="text-xs px-3 py-1.5 rounded-full bg-blue-600 text-white font-medium">📊 Cricket Stats</a>
  </nav>

  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-xl font-bold">Player Stats</h1>
    <div class="flex gap-1">
      <button class="ctab active" data-tab="batting" onclick="switchTab(this)">Batting</button>
      <button class="ctab"        data-tab="bowling" onclick="switchTab(this)">Bowling</button>
      <button class="ctab"        data-tab="matches" onclick="switchTab(this)">Matches</button>
    </div>
  </div>

  <!-- Batting tab -->
  <div id="tab-batting">
    <div id="battingTable"><p class="text-sm text-gray-400">Loading…</p></div>
  </div>

  <!-- Bowling tab -->
  <div id="tab-bowling" class="hidden">
    <div id="bowlingTable"><p class="text-sm text-gray-400">Loading…</p></div>
  </div>

  <!-- Matches tab -->
  <div id="tab-matches" class="hidden">
    <div id="matchesTable"><p class="text-sm text-gray-400">Loading…</p></div>
  </div>

</div>

<!-- Player drill-down drawer -->
<div id="statsDrawer">
  <div id="statsBackdrop" onclick="closeStatsDrawer()"></div>
  <div id="statsPanel">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-100 flex-shrink-0">
      <div id="sdAv" class="w-10 h-10 rounded-full bg-blue-50 text-blue-700 flex items-center justify-center font-bold flex-shrink-0"></div>
      <div class="flex-1 min-w-0">
        <div id="sdName" class="font-semibold text-base leading-tight"></div>
        <div id="sdMeta" class="text-xs text-gray-400 mt-0.5"></div>
      </div>
      <button onclick="closeStatsDrawer()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
    </div>
    <div class="flex border-b border-gray-100 px-5 flex-shrink-0 overflow-x-auto">
      <button class="stab-btn active" data-stab="batting" onclick="switchStab(this)">Batting</button>
      <button class="stab-btn"        data-stab="bowling" onclick="switchStab(this)">Bowling</button>
    </div>
    <div id="stab-batting" class="spane"></div>
    <div id="stab-bowling" class="spane hidden"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

const SUPABASE_URL      = "https://ioxtxbgqaognzxscgkly.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlveHR4YmdxYW9nbnp4c2Nna2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNTgxMDksImV4cCI6MjA3NTczNDEwOX0.oIST2TVUJbg4H0PziuNdLBcSHFERkkM2M29bHpsYE-E";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──
let batting = [], bowling = [], matches = [];
let sortKey = 'total_runs', sortDir = 'desc';
let allOvers = [], allBalls = [];

// ── Load data ──
async function loadAll() {
  const [b, w, m, o, bl] = await Promise.all([
    sb.from('cricket_batting_stats').select('*'),
    sb.from('cricket_bowling_stats').select('*'),
    sb.from('cricket_match_summary').select('*').order('date', { ascending:false }),
    sb.from('cricket_overs').select('*'),
    sb.from('cricket_balls').select('*'),
  ]);
  batting  = b.data || [];
  bowling  = w.data || [];
  matches  = m.data || [];
  allOvers = o.data || [];
  allBalls = bl.data || [];
  renderBatting();
  renderBowling();
  renderMatches();
}

// ── Tab switching ──
window.switchTab = (btn) => {
  document.querySelectorAll('.ctab').forEach(b => b.classList.toggle('active', b===btn));
  ['batting','bowling','matches'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==btn.dataset.tab);
  });
};

// ── Avatar helper ──
function ini(name) {
  return (name||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ── Batting table ──
function renderBatting() {
  const sorted = [...batting].sort((a,b) => {
    const av = Number(a[sortKey]||0), bv = Number(b[sortKey]||0);
    return sortDir==='desc' ? bv-av : av-bv;
  });

  const colHdr = (key, label) => {
    const active = sortKey===key;
    const cls = active ? (sortDir==='desc' ? 'sort-desc' : 'sort-asc') : '';
    return `<th class="text-right px-3 py-2 cursor-pointer hover:text-blue-600 ${cls}" onclick="window.sortBy('${key}')">${label}</th>`;
  };

  document.getElementById('battingTable').innerHTML = `
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead><tr class="bg-gray-50 text-xs text-gray-500 font-medium">
            <th class="text-left px-3 py-2">Player</th>
            ${colHdr('matches','M')}
            ${colHdr('total_runs','Runs')}
            ${colHdr('balls_faced','Balls')}
            ${colHdr('strike_rate','SR')}
            ${colHdr('fours','4s')}
            ${colHdr('sixes','6s')}
            ${colHdr('times_out','Outs')}
          </tr></thead>
          <tbody>
            ${sorted.map((r,i) => `
              <tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="openPlayerDrawer(${JSON.stringify(r.player_name)})">
                <td class="px-3 py-2.5">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-blue-50 text-blue-700 flex items-center justify-center text-xs font-semibold flex-shrink-0">${ini(r.player_name)}</div>
                    <span class="font-medium">${r.player_name}</span>
                  </div>
                </td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.matches||0}</td>
                <td class="px-3 py-2.5 text-right font-bold text-blue-700">${r.total_runs||0}</td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.balls_faced||0}</td>
                <td class="px-3 py-2.5 text-right font-medium">${Number(r.strike_rate||0).toFixed(1)}</td>
                <td class="px-3 py-2.5 text-right text-amber-600">${r.fours||0}</td>
                <td class="px-3 py-2.5 text-right text-purple-600">${r.sixes||0}</td>
                <td class="px-3 py-2.5 text-right text-orange-500">${r.times_out||0}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <p class="text-xs text-gray-400 mt-2">Tap a player row to see their match-by-match stats</p>`;
}

// ── Bowling table ──
function renderBowling() {
  const sorted = [...bowling].sort((a,b) => Number(b.wickets||0)-Number(a.wickets||0));
  document.getElementById('bowlingTable').innerHTML = `
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead><tr class="bg-gray-50 text-xs text-gray-500 font-medium">
            <th class="text-left px-3 py-2">Player</th>
            <th class="text-right px-3 py-2">M</th>
            <th class="text-right px-3 py-2">Overs</th>
            <th class="text-right px-3 py-2">Runs</th>
            <th class="text-right px-3 py-2">Wkts</th>
            <th class="text-right px-3 py-2">Econ</th>
            <th class="text-right px-3 py-2">Wides</th>
            <th class="text-right px-3 py-2">NB</th>
          </tr></thead>
          <tbody>
            ${sorted.map(r => `
              <tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="openPlayerDrawer(${JSON.stringify(r.player_name)})">
                <td class="px-3 py-2.5">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center text-xs font-semibold flex-shrink-0">${ini(r.player_name)}</div>
                    <span class="font-medium">${r.player_name}</span>
                  </div>
                </td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.matches||0}</td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.overs_bowled||0}</td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.runs_given||0}</td>
                <td class="px-3 py-2.5 text-right font-bold text-red-600">${r.wickets||0}</td>
                <td class="px-3 py-2.5 text-right font-medium">${Number(r.economy||0).toFixed(2)}</td>
                <td class="px-3 py-2.5 text-right text-orange-500">${r.wides||0}</td>
                <td class="px-3 py-2.5 text-right text-orange-500">${r.no_balls||0}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── Match history ──
function renderMatches() {
  if (!matches.length) {
    document.getElementById('matchesTable').innerHTML = '<p class="text-sm text-gray-400">No matches yet.</p>';
    return;
  }
  document.getElementById('matchesTable').innerHTML = matches.map(m => {
    const complete = m.status==='complete';
    const s1 = complete ? `${m.innings1_net??'—'}/${m.innings1_wickets??0}W` : '—';
    const s2 = complete ? `${m.innings2_net??'—'}/${m.innings2_wickets??0}W` : '—';
    return `<div class="bg-white rounded-2xl shadow p-4 mb-3">
      <div class="flex items-start justify-between">
        <div>
          <div class="font-semibold text-sm">${m.team1_name} vs ${m.team2_name}</div>
          <div class="text-xs text-gray-400 mt-0.5">${m.date} · ${m.overs} overs · −${m.wicket_penalty} pen</div>
        </div>
        ${complete?`<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">🏆 ${m.winner_team}</span>`:
          `<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">In progress</span>`}
      </div>
      ${complete?`<div class="grid grid-cols-2 gap-2 mt-3">
        <div class="bg-gray-50 rounded-xl p-2.5 text-center">
          <div class="text-xs text-gray-500">${m.team1_name}</div>
          <div class="font-bold text-lg mt-0.5">${s1}</div>
        </div>
        <div class="bg-gray-50 rounded-xl p-2.5 text-center">
          <div class="text-xs text-gray-500">${m.team2_name}</div>
          <div class="font-bold text-lg mt-0.5">${s2}</div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── Sort ──
window.sortBy = (key) => {
  if (sortKey===key) sortDir = sortDir==='desc' ? 'asc' : 'desc';
  else { sortKey=key; sortDir='desc'; }
  renderBatting();
};

// ── Player drawer ──
window.openPlayerDrawer = (name) => {
  document.getElementById('sdAv').textContent = ini(name);
  document.getElementById('sdName').textContent = name;
  // aggregate from raw data
  const batRow = batting.find(r=>r.player_name===name)||{};
  const bowRow = bowling.find(r=>r.player_name===name)||{};
  document.getElementById('sdMeta').textContent =
    `${batRow.total_runs||0} runs · ${bowRow.wickets||0} wkts · ${batRow.matches||bowRow.matches||0} matches`;

  // batting pane
  // per-match batting: group balls by match via overs
  const playerBalls = allBalls.filter(b=>b.batsman_name===name);
  const overIds = new Set(playerBalls.map(b=>b.over_id));
  // group by match via overs
  const matchRunMap = {};
  for (const b of playerBalls) {
    const ov = allOvers.find(o=>o.id===b.over_id);
    if (!ov) continue;
    const mid = ov.match_id;
    if (!matchRunMap[mid]) matchRunMap[mid]={runs:0,balls:0,fours:0,sixes:0,wickets:0};
    matchRunMap[mid].runs += Number(b.runs||0);
    matchRunMap[mid].balls++;
    if (b.runs===4) matchRunMap[mid].fours++;
    if (b.runs===6) matchRunMap[mid].sixes++;
    if (b.is_wicket) matchRunMap[mid].wickets++;
  }
  const batRows = Object.entries(matchRunMap).map(([mid,s])=>{
    const m = matches.find(x=>x.id===mid)||{};
    const sr = s.balls>0 ? ((s.runs/s.balls)*100).toFixed(1) : '0.0';
    return `<div class="border-t border-gray-100 py-2">
      <div class="flex justify-between items-baseline">
        <div class="text-xs font-medium text-gray-700">${m.team1_name||''} vs ${m.team2_name||''}</div>
        <span class="font-bold text-blue-700">${s.runs} <span class="text-xs text-gray-400 font-normal">(${s.balls}b)</span></span>
      </div>
      <div class="flex gap-3 text-xs text-gray-400 mt-0.5">
        <span>${m.date||''}</span>
        <span>SR ${sr}</span>
        ${s.fours?`<span class="text-amber-600">${s.fours}×4</span>`:''}
        ${s.sixes?`<span class="text-purple-600">${s.sixes}×6</span>`:''}
        ${s.wickets?`<span class="text-orange-500">${s.wickets}W</span>`:''}
      </div>
    </div>`;
  }).join('') || '<p class="text-sm text-gray-400 py-3">No batting records.</p>';

  // summary stat pills
  const statPills = `<div class="flex flex-wrap gap-2 mb-4">
    <span class="text-xs bg-blue-50 text-blue-700 px-3 py-1 rounded-full font-medium">${batRow.total_runs||0} runs</span>
    <span class="text-xs bg-amber-50 text-amber-700 px-3 py-1 rounded-full">${batRow.fours||0} fours</span>
    <span class="text-xs bg-purple-50 text-purple-700 px-3 py-1 rounded-full">${batRow.sixes||0} sixes</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">SR ${Number(batRow.strike_rate||0).toFixed(1)}</span>
    <span class="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">${batRow.times_out||0} times out</span>
  </div>`;

  document.getElementById('stab-batting').innerHTML = statPills + batRows;

  // bowling pane — per-match
  const playerOvers = allOvers.filter(o=>o.bowler_name===name);
  const bowlMatchMap = {};
  for (const ov of playerOvers) {
    const mid = ov.match_id;
    if (!bowlMatchMap[mid]) bowlMatchMap[mid]={overs:0,runs:0,wickets:0,wides:0,nb:0};
    bowlMatchMap[mid].overs++;
    bowlMatchMap[mid].runs += Number(ov.runs_scored||0);
    bowlMatchMap[mid].wickets += Number(ov.wickets||0);
    // count extras from balls
    const ovBalls = allBalls.filter(b=>b.over_id===ov.id);
    for (const b of ovBalls) {
      if (b.extra_type==='wide') bowlMatchMap[mid].wides++;
      if (b.extra_type==='no_ball') bowlMatchMap[mid].nb++;
    }
  }
  const bowlPills = `<div class="flex flex-wrap gap-2 mb-4">
    <span class="text-xs bg-red-50 text-red-700 px-3 py-1 rounded-full font-medium">${bowRow.wickets||0} wickets</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">${bowRow.overs_bowled||0} overs</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">Econ ${Number(bowRow.economy||0).toFixed(2)}</span>
    <span class="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">${bowRow.wides||0}Wd ${bowRow.no_balls||0}NB</span>
  </div>`;

  const bowlRows = Object.entries(bowlMatchMap).map(([mid,s])=>{
    const m = matches.find(x=>x.id===mid)||{};
    const econ = s.overs>0 ? (s.runs/s.overs).toFixed(2) : '—';
    return `<div class="border-t border-gray-100 py-2">
      <div class="flex justify-between items-baseline">
        <div class="text-xs font-medium text-gray-700">${m.team1_name||''} vs ${m.team2_name||''}</div>
        <span class="font-bold text-red-600">${s.wickets}W <span class="text-xs text-gray-400 font-normal">${s.runs}r ${s.overs}ov</span></span>
      </div>
      <div class="flex gap-3 text-xs text-gray-400 mt-0.5">
        <span>${m.date||''}</span>
        <span>Econ ${econ}</span>
        ${s.wides?`<span class="text-orange-500">${s.wides}Wd</span>`:''}
        ${s.nb?`<span class="text-orange-500">${s.nb}NB</span>`:''}
      </div>
    </div>`;
  }).join('') || '<p class="text-sm text-gray-400 py-3">No bowling records.</p>';

  document.getElementById('stab-bowling').innerHTML = bowlPills + bowlRows;

  // reset to batting tab
  document.querySelectorAll('.stab-btn').forEach(b=>b.classList.toggle('active',b.dataset.stab==='batting'));
  document.getElementById('stab-batting').classList.remove('hidden');
  document.getElementById('stab-bowling').classList.add('hidden');

  document.getElementById('statsDrawer').classList.add('open');
  document.body.style.overflow='hidden';
};

window.closeStatsDrawer = () => {
  document.getElementById('statsDrawer').classList.remove('open');
  document.body.style.overflow='';
};

window.switchStab = (btn) => {
  document.querySelectorAll('.stab-btn').forEach(b=>b.classList.toggle('active',b===btn));
  ['batting','bowling'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('hidden',t!==btn.dataset.stab);
  });
};

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeStatsDrawer(); });

loadAll();
</script>
</body>
</html>
