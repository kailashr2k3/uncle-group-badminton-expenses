<script type="module">

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlveHR4YmdxYW9nbnp4c2Nna2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNTgxMDksImV4cCI6MjA3NTczNDEwOX0.oIST2TVUJbg4H0PziuNdLBcSHFERkkM2M29bHpsYE-E";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──
let batting = [], bowling = [], matches = [];
let sortKey = 'total_runs', sortDir = 'desc';

// ── Load data ──
// badminton state
let badMatches = [], badRallies = [], badSquads = [];
const badPlayerReg = {};

async function loadAll() {
  const [b, w, m, bm, br, bsq] = await Promise.all([
    sb.from('cricket_batting_stats').select('*'),
    sb.from('cricket_bowling_stats').select('*'),
    sb.from('cricket_match_summary').select('*').order('date', { ascending:false }),
    sb.from('badminton_matches').select('*').eq('status','complete').order('date',{ascending:false}),
    sb.from('badminton_rallies').select('*'),
    sb.from('badminton_squads').select('team,player_id,guest_name,match_id'),
  ]);
  batting    = b.data  || [];
  bowling    = w.data  || [];
  matches    = m.data  || [];
  badMatches = bm.data || [];
  badRallies = br.data || [];
  badSquads  = bsq.data|| [];

  // Resolve player names for badminton
  const uuids = [...new Set(badSquads.filter(s=>s.player_id).map(s=>s.player_id))];
  if (uuids.length) {
    const { data:pRows } = await sb.from('players').select('id,name').in('id', uuids);
    (pRows||[]).forEach(p => { badPlayerReg[p.id] = p.name; });
  }

  renderBatting();
  renderBowling();
  renderMatches();
  renderBadmintonStats();
}

// Per-player drill-down: fetch from views filtered by player_id
async function loadPlayerStats(playerName) {
  // Get the player_id for this name
  const batRow = batting.find(r => r.player_name === playerName) || {};
  const bowRow = bowling.find(r => r.player_name === playerName) || {};
  const playerId = batRow.player_id || bowRow.player_id;

  if (!playerId) {
    // Guest player — fetch by guest name columns
    const [ovRes, blRes] = await Promise.all([
      sb.from('cricket_overs').select('id,match_id,innings,over_number,runs_scored,wickets,bowler_guest').eq('bowler_guest', playerName),
      sb.from('cricket_balls').select('id,over_id,runs,extra_type,is_wicket,batsman_guest').eq('batsman_guest', playerName),
    ]);
    return { overs: ovRes.data||[], balls: blRes.data||[], isGuest: true };
  }

  // Registered player — fetch by player_id
  const [ovRes, blRes] = await Promise.all([
    sb.from('cricket_overs').select('id,match_id,innings,over_number,runs_scored,wickets').eq('bowler_id', playerId),
    sb.from('cricket_balls').select('id,over_id,runs,extra_type,is_wicket').eq('batsman_id', playerId),
  ]);
  return { overs: ovRes.data||[], balls: blRes.data||[], isGuest: false };
}

// ── Tab switching ──
window.switchTab = (btn) => {
  document.querySelectorAll('.ctab').forEach(b => b.classList.toggle('active', b===btn));
  ['cricket-batting','cricket-bowling','cricket-matches','badminton-stats'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==btn.dataset.tab);
  });
};

// ── Avatar helper ──
function ini(name) {
  return (name||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ── Batting table ──
function renderBatting() {
  const sorted = [...batting].sort((a,b) => {
    const av = Number(a[sortKey]||0), bv = Number(b[sortKey]||0);
    return sortDir==='desc' ? bv-av : av-bv;
  });

  const colHdr = (key, label) => {
    const active = sortKey===key;
    const cls = active ? (sortDir==='desc' ? 'sort-desc' : 'sort-asc') : '';
    return `<th class="text-right px-3 py-2 cursor-pointer hover:text-blue-600 ${cls}" onclick="window.sortBy('${key}')">${label}</th>`;
  };

  document.getElementById('battingTable').innerHTML = `
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead><tr class="bg-gray-50 text-xs text-gray-500 font-medium">
            <th class="text-left px-3 py-2">Player</th>
            ${colHdr('matches','M')}
            ${colHdr('total_runs','Runs')}
            ${colHdr('balls_faced','Balls')}
            ${colHdr('strike_rate','SR')}
            ${colHdr('fours','4s')}
            ${colHdr('sixes','6s')}
            ${colHdr('times_out','Outs')}
          </tr></thead>
          <tbody>
            ${sorted.map((r,i) => { const pidx = registerPlayer(r.player_name); return `
              <tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="openPlayerDrawer(${pidx})">
                <td class="px-3 py-2.5">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-blue-50 text-blue-700 flex items-center justify-center text-xs font-semibold flex-shrink-0">${ini(r.player_name)}</div>
                    <span class="font-medium">${r.player_name}</span>
                  </div>
                </td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.matches||0}</td>
                <td class="px-3 py-2.5 text-right font-bold text-blue-700">${r.total_runs||0}</td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.balls_faced||0}</td>
                <td class="px-3 py-2.5 text-right font-medium">${Number(r.strike_rate||0).toFixed(1)}</td>
                <td class="px-3 py-2.5 text-right text-amber-600">${r.fours||0}</td>
                <td class="px-3 py-2.5 text-right text-purple-600">${r.sixes||0}</td>
                <td class="px-3 py-2.5 text-right text-orange-500">${r.times_out||0}</td>
              </tr>`}).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <p class="text-xs text-gray-400 mt-2">Tap a player row to see their match-by-match stats</p>`;
}

// ── Bowling table ──

            <th class="text-right px-3 py-2">Overs</th>
            <th class="text-right px-3 py-2">Runs</th>
            <th class="text-right px-3 py-2">Wkts</th>
            <th class="text-right px-3 py-2">Econ</th>

          </tr></thead>
          <tbody>
            ${sorted.map(r => { const pidx = registerPlayer(r.player_name); return `
              <tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="openPlayerDrawer(${pidx})">
                <td class="px-3 py-2.5">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center text-xs font-semibold flex-shrink-0">${ini(r.player_name)}</div>
                    <span class="font-medium">${r.player_name}</span>
                  </div>
                </td>
                <td class="px-3 py-2.5 text-right text-gray-500">${r.matches||0}</td>

// ── Match history ──
function renderMatches() {
  if (!matches.length) {
    document.getElementById('matchesTable').innerHTML = '<p class="text-sm text-gray-400">No matches yet.</p>';
    return;
  }
  document.getElementById('matchesTable').innerHTML = matches.map((m,i) => {
    const complete  = m.status==='complete';
    const s1 = complete ? `${m.innings1_net??'—'}/${m.innings1_wickets??0}W` : '—';
    const s2 = complete ? `${m.innings2_net??'—'}/${m.innings2_wickets??0}W` : '—';
    return `<details class="bg-white rounded-2xl shadow mb-3 overflow-hidden">
      <summary class="p-4 cursor-pointer list-none">
        <div class="flex items-start justify-between">
          <div>
            <div class="font-semibold text-sm">${m.team1_name} vs ${m.team2_name}</div>
            <div class="text-xs text-gray-400 mt-0.5">${m.date} · ${m.overs} overs · −${m.wicket_penalty} pen</div>
          </div>
          <div class="text-right ml-2 flex-shrink-0">
            ${complete
              ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">🏆 ${m.winner_team} won</span>`
              : `<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">In progress</span>`}
            ${complete ? `<div class="text-xs text-gray-500 mt-1">${s1} vs ${s2}</div>` : ''}
          </div>
        </div>
      </summary>
      <div class="border-t border-gray-100 px-4 pb-4 pt-3" id="mcard-${m.id}">
        <div class="text-xs text-gray-400 text-center py-3">Loading scorecard…</div>
      </div>
    </details>`;
  }).join('');

  // Wire lazy-load for each match details element
  document.querySelectorAll('#matchesTable details').forEach((el, i) => {
    el.addEventListener('toggle', () => {
      if (el.open) loadMatchScorecard(matches[i].id);
    });
  });
}

// ── Fetch and render full match scorecard ──
async function loadMatchScorecard(matchId) {
  const mount = document.getElementById('mcard-'+matchId);
  if (!mount || mount.dataset.loaded) return;
  mount.dataset.loaded = '1';

  const m = matches.find(x=>x.id===matchId)||{};
  if (m.status !== 'complete') {
    mount.innerHTML = `<p class="text-xs text-gray-400">Match not complete yet.</p>`;
    return;
  }

  // Fetch overs + balls for this match
  // Fetch overs for this match
  const ovRes = await sb.from('cricket_overs')
    .select('id,innings,over_number,runs_scored,wickets,bowler_id,bowler_guest')
    .eq('match_id', matchId)
    .order('innings').order('over_number');

  const overs   = ovRes.data || [];
  const overIds = overs.map(o=>o.id);

  // Fetch balls for these overs
  const { data: balls } = overIds.length
    ? await sb.from('cricket_balls')
        .select('id,over_id,runs,extra_type,is_wicket,batsman_id,batsman_guest')
        .in('over_id', overIds)
    : { data: [] };

  // Fetch player names for any registered (non-guest) players in one query
  const allPlayerIds = [
    ...new Set([
      ...overs.filter(o=>o.bowler_id).map(o=>o.bowler_id),
      ...(balls||[]).filter(b=>b.batsman_id).map(b=>b.batsman_id),
    ])
  ];
  const playerNameMap = {};
  if (allPlayerIds.length) {
    const { data: pRows } = await sb.from('players').select('id,name').in('id', allPlayerIds);
    (pRows||[]).forEach(p => { playerNameMap[p.id] = p.name; });
  }

  // Helper: get display name
  const batName  = b => playerNameMap[b.batsman_id] || b.batsman_guest || '?';
  const bowlName = o => playerNameMap[o.bowler_id]  || o.bowler_guest  || '?';

  // Build innings scorecards
  const innings = [1,2].map(inn => {
    const innOvers = overs.filter(o=>o.innings===inn);
    if (!innOvers.length) return null;

    // Per-batsman stats
    const batStats = {};
    for (const b of (balls||[]).filter(b => innOvers.some(o=>o.id===b.over_id))) {
      const n = batName(b);
      if (!batStats[n]) batStats[n] = { runs:0, balls:0, fours:0, sixes:0, wickets:0 };
      if (!b.extra_type) {
        batStats[n].balls++;
        batStats[n].runs += Number(b.runs||0);
        if (Number(b.runs)===4) batStats[n].fours++;
        if (Number(b.runs)===6) batStats[n].sixes++;
      }
      if (b.is_wicket) batStats[n].wickets++;
    }

    // Per-bowler stats
    const bowlStats = {};
    for (const o of innOvers) {
      const n = bowlName(o);
      if (!bowlStats[n]) bowlStats[n] = { overs:0, runs:0, wickets:0 };
      bowlStats[n].overs++;
      bowlStats[n].runs += Number(o.runs_scored||0);
      bowlStats[n].wickets += Number(o.wickets||0);
    }

    const teamName = inn===1 ? m.team1_name : m.team2_name;
    const net = inn===1 ? m.innings1_net : m.innings2_net;
    const wkts = inn===1 ? m.innings1_wickets : m.innings2_wickets;

    const batRows = Object.entries(batStats).map(([n,s]) =>
      `<tr class="border-b border-gray-50 last:border-0">
        <td class="py-1.5 text-xs font-medium">${n}</td>
        <td class="py-1.5 text-xs text-right font-bold text-blue-700">${s.runs}</td>
        <td class="py-1.5 text-xs text-right text-gray-400">${s.balls}b</td>
        <td class="py-1.5 text-xs text-right text-amber-600">${s.fours||''}</td>
        <td class="py-1.5 text-xs text-right text-purple-600">${s.sixes||''}</td>
        <td class="py-1.5 text-xs text-right text-orange-500">${s.wickets||''}</td>
      </tr>`).join('');

    const bowlRows = Object.entries(bowlStats).map(([n,s]) =>
      `<tr class="border-b border-gray-50 last:border-0">
        <td class="py-1.5 text-xs font-medium">${n}</td>
        <td class="py-1.5 text-xs text-right text-gray-500">${s.overs}</td>
        <td class="py-1.5 text-xs text-right text-gray-500">${s.runs}</td>
        <td class="py-1.5 text-xs text-right font-bold text-red-600">${s.wickets}</td>
      </tr>`).join('');

    return `<div class="mb-4">
      <div class="flex items-baseline justify-between mb-2">
        <span class="text-xs font-bold text-gray-600 uppercase tracking-wide">${teamName}</span>
        <span class="text-sm font-bold">${net??'—'}/${wkts??0}W · ${innOvers.length}ov</span>
      </div>
      <table class="w-full mb-2">
        <thead><tr class="text-gray-400 text-xs">
          <th class="text-left pb-1">Batsman</th>
          <th class="text-right pb-1">R</th><th class="text-right pb-1">B</th>
          <th class="text-right pb-1">4s</th><th class="text-right pb-1">6s</th>
          <th class="text-right pb-1">W</th>
        </tr></thead>
        <tbody>${batRows||'<tr><td colspan="6" class="text-xs text-gray-400 py-1">No ball data</td></tr>'}</tbody>
      </table>
      <table class="w-full">
        <thead><tr class="text-gray-400 text-xs">
          <th class="text-left pb-1">Bowler</th>
          <th class="text-right pb-1">Ov</th><th class="text-right pb-1">R</th>
          <th class="text-right pb-1">W</th>
        </tr></thead>
        <tbody>${bowlRows||'<tr><td colspan="4" class="text-xs text-gray-400 py-1">No over data</td></tr>'}</tbody>
      </table>
    </div>`;
  }).filter(Boolean).join('<hr class="border-gray-100 my-3">');

  mount.innerHTML = innings || '<p class="text-xs text-gray-400">No scorecard data.</p>';
}

// ── Player registry — avoids JSON.stringify in onclick attrs ──
const playerRegistry = {};
let playerRegistryIdx = 0;
function registerPlayer(name) {
  const idx = playerRegistryIdx++;
  playerRegistry[idx] = name;
  return idx;
}

// ── Sort ──
window.sortBy = (key) => {
  if (sortKey===key) sortDir = sortDir==='desc' ? 'asc' : 'desc';
  else { sortKey=key; sortDir='desc'; }
  renderBatting();
};

// ── Player drawer ──
window.openPlayerDrawer = async (idx) => {
  const name = playerRegistry[idx];
  if (!name) return;
  // Reset drawer tab labels back to cricket labels
  const tabs = document.querySelectorAll('.stab-btn');
  if (tabs[0]) tabs[0].textContent = 'Batting';
  if (tabs[1]) tabs[1].textContent = 'Bowling';
  document.getElementById('sdAv').textContent = ini(name);
  document.getElementById('sdName').textContent = name;
  const batRow = batting.find(r=>r.player_name===name)||{};
  const bowRow = bowling.find(r=>r.player_name===name)||{};
  document.getElementById('sdMeta').textContent =
    `${batRow.total_runs||0} runs · ${bowRow.wickets||0} wkts · ${batRow.matches||bowRow.matches||0} matches`;

  // show drawer immediately with loading state
  document.getElementById('stab-batting').innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">Loading…</p>';
  document.getElementById('stab-bowling').innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">Loading…</p>';
  document.getElementById('statsDrawer').classList.add('open');
  document.body.style.overflow='hidden';

  // fetch player-specific data
  const { overs: playerOvers, balls: playerBalls } = await loadPlayerStats(name);

  // Build over→match lookup
  const overMatchMap = Object.fromEntries(playerOvers.map(o=>[o.id, o.match_id]));

  // Batting — group balls by match
  const matchRunMap = {};
  for (const b of playerBalls) {
    const mid = overMatchMap[b.over_id];
    if (!mid) continue;
    if (!matchRunMap[mid]) matchRunMap[mid]={runs:0,balls:0,fours:0,sixes:0,wickets:0};
    matchRunMap[mid].runs += Number(b.runs||0);
    matchRunMap[mid].balls++;
    if (Number(b.runs)===4) matchRunMap[mid].fours++;
    if (Number(b.runs)===6) matchRunMap[mid].sixes++;
    if (b.is_wicket) matchRunMap[mid].wickets++;
  }
  const batRows = Object.entries(matchRunMap).map(([mid,s])=>{
    const m = matches.find(x=>x.id===mid)||{};
    const sr = s.balls>0 ? ((s.runs/s.balls)*100).toFixed(1) : '0.0';
    return `<div class="border-t border-gray-100 py-2">
      <div class="flex justify-between items-baseline">
        <div class="text-xs font-medium text-gray-700">${m.team1_name||''} vs ${m.team2_name||''}</div>
        <span class="font-bold text-blue-700">${s.runs} <span class="text-xs text-gray-400 font-normal">(${s.balls}b)</span></span>
      </div>
      <div class="flex gap-3 text-xs text-gray-400 mt-0.5">
        <span>${m.date||''}</span>
        <span>SR ${sr}</span>
        ${s.fours?`<span class="text-amber-600">${s.fours}×4</span>`:''}
        ${s.sixes?`<span class="text-purple-600">${s.sixes}×6</span>`:''}
        ${s.wickets?`<span class="text-orange-500">${s.wickets}W</span>`:''}
      </div>
    </div>`;
  }).join('') || '<p class="text-sm text-gray-400 py-3">No batting records.</p>';

  // summary stat pills
  const statPills = `<div class="flex flex-wrap gap-2 mb-4">
    <span class="text-xs bg-blue-50 text-blue-700 px-3 py-1 rounded-full font-medium">${batRow.total_runs||0} runs</span>
    <span class="text-xs bg-amber-50 text-amber-700 px-3 py-1 rounded-full">${batRow.fours||0} fours</span>
    <span class="text-xs bg-purple-50 text-purple-700 px-3 py-1 rounded-full">${batRow.sixes||0} sixes</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">SR ${Number(batRow.strike_rate||0).toFixed(1)}</span>
    <span class="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">${batRow.times_out||0} times out</span>
  </div>`;

  document.getElementById('stab-batting').innerHTML = statPills + batRows;

  // bowling pane — per-match (use playerOvers already fetched above)
  const bowlMatchMap = {};
  for (const ov of playerOvers) {
    const mid = ov.match_id;
    if (!bowlMatchMap[mid]) bowlMatchMap[mid]={overs:0,runs:0,wickets:0,wides:0,nb:0};
    bowlMatchMap[mid].overs++;
    bowlMatchMap[mid].runs += Number(ov.runs_scored||0);
    bowlMatchMap[mid].wickets += Number(ov.wickets||0);
    // count extras from balls (use fetched playerBalls — bowler's balls from their overs)
    const ovBalls = playerBalls.filter(b=>b.over_id===ov.id);
    for (const b of ovBalls) {
      if (b.extra_type==='wide') bowlMatchMap[mid].wides++;
      if (b.extra_type==='no_ball') bowlMatchMap[mid].nb++;
    }
  }
  const bowlPills = `<div class="flex flex-wrap gap-2 mb-4">
    <span class="text-xs bg-red-50 text-red-700 px-3 py-1 rounded-full font-medium">${bowRow.wickets||0} wickets</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">${bowRow.overs_bowled||0} overs</span>
    <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">Econ ${Number(bowRow.economy||0).toFixed(2)}</span>
    <span class="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">${bowRow.wides||0}Wd ${bowRow.no_balls||0}NB</span>
  </div>`;

  const bowlRows = Object.entries(bowlMatchMap).map(([mid,s])=>{
    const m = matches.find(x=>x.id===mid)||{};
    const econ = s.overs>0 ? (s.runs/s.overs).toFixed(2) : '—';
    return `<div class="border-t border-gray-100 py-2">
      <div class="flex justify-between items-baseline">
        <div class="text-xs font-medium text-gray-700">${m.team1_name||''} vs ${m.team2_name||''}</div>
        <span class="font-bold text-red-600">${s.wickets}W <span class="text-xs text-gray-400 font-normal">${s.runs}r ${s.overs}ov</span></span>
      </div>
      <div class="flex gap-3 text-xs text-gray-400 mt-0.5">
        <span>${m.date||''}</span>
        <span>Econ ${econ}</span>
        ${s.wides?`<span class="text-orange-500">${s.wides}Wd</span>`:''}
        ${s.nb?`<span class="text-orange-500">${s.nb}NB</span>`:''}
      </div>
    </div>`;
  }).join('') || '<p class="text-sm text-gray-400 py-3">No bowling records.</p>';

  document.getElementById('stab-bowling').innerHTML = bowlPills + bowlRows;

  // reset to batting tab
  document.querySelectorAll('.stab-btn').forEach(b=>b.classList.toggle('active',b.dataset.stab==='batting'));
  document.getElementById('stab-batting').classList.remove('hidden');
  document.getElementById('stab-bowling').classList.add('hidden');

};  // end openPlayerDrawer

window.closeStatsDrawer = () => {
  document.getElementById('statsDrawer').classList.remove('open');
  document.body.style.overflow='';
};

window.switchStab = (btn) => {
  document.querySelectorAll('.stab-btn').forEach(b=>b.classList.toggle('active',b===btn));
  ['batting','bowling'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('hidden',t!==btn.dataset.stab);
  });
};

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeStatsDrawer(); });

// ── Badminton stats ───────────────────────────────────────
function renderBadmintonStats() {
  const mount = document.getElementById('badmintonStats');
  if (!mount) return;

  if (!badMatches.length) {
    mount.innerHTML = '<p class="text-sm text-gray-400">No completed badminton matches yet.</p>';
    return;
  }

  // Build per-player stats from rallies + squads
  // playerKey → { name, matches:Set, pointsScored, errors:{reason:count}, played:Set }
  const stats = {};

  // Helper to get/init player entry
  const getP = (key, name) => {
    if (!stats[key]) stats[key] = { name, matches: new Set(), pointsScored: 0, errors: {} };
    return stats[key];
  };

  // Map match_id → squad lookup
  const matchSquad = {};
  for (const s of badSquads) {
    if (!matchSquad[s.match_id]) matchSquad[s.match_id] = [];
    const name = s.player_id ? (badPlayerReg[s.player_id] || 'Unknown') : (s.guest_name || 'Guest');
    matchSquad[s.match_id].push({ team: s.team, key: s.player_id||name, name });
  }

  // Map match_id → team assignments
  const matchTeams = {};
  for (const m of badMatches) {
    matchTeams[m.id] = { team1: m.team1_name, team2: m.team2_name };
  }

  for (const r of badRallies) {
    const squad = matchSquad[r.match_id] || [];
    // Points scored — all players on scoring team get credit
    const scorers = squad.filter(p => p.team === r.scoring_team);
    for (const p of scorers) {
      const entry = getP(p.key, p.name);
      entry.pointsScored++;
      entry.matches.add(r.match_id);
    }
    // Errors — player who made the error
    if (r.loss_reason) {
      let errorKey = null, errorName = null;
      if (r.loss_player_id) {
        errorKey  = r.loss_player_id;
        errorName = badPlayerReg[r.loss_player_id] || 'Unknown';
      } else if (r.loss_guest_name) {
        errorKey  = r.loss_guest_name;
        errorName = r.loss_guest_name;
      }
      if (errorKey) {
        const entry = getP(errorKey, errorName);
        entry.matches.add(r.match_id);
        entry.errors[r.loss_reason] = (entry.errors[r.loss_reason] || 0) + 1;
      }
    }
  }

  const rows = Object.values(stats)
    .sort((a,b) => b.pointsScored - a.pointsScored);

  if (!rows.length) {
    mount.innerHTML = '<p class="text-sm text-gray-400">No rally data recorded yet.</p>';
    return;
  }

  const ERROR_LABELS = {
    service_error:'Service err', net:'Net', out:'Out', smash_out:'Smash out',
    net_cord:'Net cord', unforced_error:'Unforced', forced_error:'Forced',
    let:'Let', other:'Other'
  };

  // Summary table
  const tableRows = rows.map((r,i) => {
    const pidx = badRegisterPlayer(r.name);
    const totalErrors = Object.values(r.errors).reduce((s,v)=>s+v,0);
    return `<tr class="border-t border-gray-100 hover:bg-gray-50 cursor-pointer" onclick="openBadPlayerDrawer(${pidx})">
      <td class="px-3 py-2.5">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-blue-50 text-blue-700 flex items-center justify-center text-xs font-semibold">${ini(r.name)}</div>
          <span class="font-medium text-sm">${r.name}</span>
        </div>
      </td>
      <td class="px-3 py-2.5 text-right text-gray-500">${r.matches.size}</td>
      <td class="px-3 py-2.5 text-right font-bold text-blue-700">${r.pointsScored}</td>
      <td class="px-3 py-2.5 text-right text-red-500">${totalErrors||'—'}</td>
    </tr>`;
  }).join('');

  // Recent matches
  const matchRows = badMatches.slice(0,5).map(m => `
    <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
      <div>
        <span class="text-sm font-medium">${m.team1_name} vs ${m.team2_name}</span>
        <span class="text-xs text-gray-400 ml-2">${m.date}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-lg font-bold text-blue-700">${m.team1_score}</span>
        <span class="text-gray-300">–</span>
        <span class="text-lg font-bold text-emerald-700">${m.team2_score}</span>
        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium ml-1">🏆 ${m.winner_team}</span>
      </div>
    </div>`).join('');

  mount.innerHTML = `
    <div class="flex flex-col gap-4">
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <div class="px-4 pt-4 pb-2">
          <div class="text-sm font-semibold text-gray-700 mb-0.5">Player Points</div>
          <div class="text-xs text-gray-400">Tap a player to see their error breakdown</div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead><tr class="bg-gray-50 text-xs text-gray-500 font-medium">
              <th class="text-left px-3 py-2">Player</th>
              <th class="text-right px-3 py-2">Matches</th>
              <th class="text-right px-3 py-2">Points</th>
              <th class="text-right px-3 py-2">Errors</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
      ${badMatches.length ? `<div class="bg-white rounded-2xl shadow p-4">
        <div class="text-sm font-semibold text-gray-700 mb-3">Recent Matches</div>
        ${matchRows}
      </div>` : ''}
    </div>`;
}

// ── Badminton player registry ─────────────────────────────
const badPlayerRegistry = {};
let badPlayerRegIdx = 0;
function badRegisterPlayer(name) {
  const idx = badPlayerRegIdx++;
  badPlayerRegistry[idx] = name;
  return idx;
}

// ── Badminton player drawer ───────────────────────────────
window.openBadPlayerDrawer = (idx) => {
  const name = badPlayerRegistry[idx];
  if (!name) return;

  // Find this player's key across squads
  const playerUuid = Object.entries(badPlayerReg).find(([id,n])=>n===name)?.[0];
  const key = playerUuid || name;

  // Build stats for this player
  const matchSet = new Set();
  let pointsScored = 0;
  const errors = {};
  const matchPoints = {}; // matchId → points

  // Which team was this player on per match?
  const playerTeams = {};
  for (const s of badSquads) {
    const sKey = s.player_id || s.guest_name;
    if (sKey === key || (s.player_id && badPlayerReg[s.player_id] === name)) {
      playerTeams[s.match_id] = s.team;
    }
  }

  for (const r of badRallies) {
    const pTeam = playerTeams[r.match_id];
    if (pTeam === undefined) continue;
    matchSet.add(r.match_id);

    if (pTeam === r.scoring_team) {
      pointsScored++;
      matchPoints[r.match_id] = (matchPoints[r.match_id] || 0) + 1;
    }
    if (r.loss_reason) {
      const errKey = r.loss_player_id || r.loss_guest_name;
      if (errKey === key || (r.loss_player_id && badPlayerReg[r.loss_player_id] === name)) {
        errors[r.loss_reason] = (errors[r.loss_reason] || 0) + 1;
      }
    }
  }

  const totalErrors = Object.values(errors).reduce((s,v)=>s+v,0);
  const ERROR_LABELS = {
    service_error:'Service error', net:'Net', out:'Out', smash_out:'Smash out',
    net_cord:'Net cord', unforced_error:'Unforced error', forced_error:'Forced error',
    let:'Let', other:'Other'
  };

  // Per-match breakdown
  const matchBreakdown = [...matchSet].map(mid => {
    const m = badMatches.find(x=>x.id===mid);
    if (!m) return '';
    const pts = matchPoints[mid] || 0;
    const pTeam = playerTeams[mid];
    const teamName = pTeam===1 ? m.team1_name : m.team2_name;
    const won = m.winner_team === teamName;
    return `<div class="flex justify-between items-baseline py-1.5 border-b border-gray-100 last:border-0">
      <div>
        <span class="text-xs font-medium">${m.team1_name} vs ${m.team2_name}</span>
        <span class="text-xs text-gray-400 ml-1">${m.date}</span>
        ${won ? '<span class="text-xs text-green-600 ml-1 font-medium">W</span>' : '<span class="text-xs text-red-400 ml-1">L</span>'}
      </div>
      <span class="font-bold text-blue-700">${pts} pts</span>
    </div>`;
  }).join('');

  const errorRows = Object.entries(errors).sort((a,b)=>b[1]-a[1]).map(([r,c]) =>
    `<div class="flex justify-between text-xs py-1.5 border-b border-gray-100 last:border-0">
      <span class="text-gray-600">${ERROR_LABELS[r]||r}</span>
      <span class="font-semibold text-red-500">${c}</span>
    </div>`).join('');

  // Populate drawer
  document.getElementById('sdAv').textContent = ini(name);
  document.getElementById('sdAv').className = 'w-10 h-10 rounded-full bg-blue-50 text-blue-700 flex items-center justify-center font-bold flex-shrink-0';
  document.getElementById('sdName').textContent = name;
  document.getElementById('sdMeta').textContent = `${matchSet.size} matches · ${pointsScored} points · ${totalErrors} errors`;

  // Use batting/bowling tabs for points/errors
  document.getElementById('stab-batting').innerHTML = `
    <div class="mb-4 grid grid-cols-3 gap-2">
      <div class="bg-blue-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-blue-700">${pointsScored}</div>
        <div class="text-xs text-gray-500 mt-0.5">Points</div>
      </div>
      <div class="bg-red-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-red-500">${totalErrors}</div>
        <div class="text-xs text-gray-500 mt-0.5">Errors</div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-gray-700">${matchSet.size}</div>
        <div class="text-xs text-gray-500 mt-0.5">Matches</div>
      </div>
    </div>
    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Per match</div>
    ${matchBreakdown || '<p class="text-xs text-gray-400">No data</p>'}`;

  document.getElementById('stab-bowling').innerHTML = `
    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Error breakdown</div>
    ${errorRows || '<p class="text-xs text-gray-400">No errors recorded</p>'}`;

  // Reset tabs to batting (points) tab
  document.querySelectorAll('.stab-btn').forEach(b => b.classList.toggle('active', b.dataset.stab==='batting'));
  document.getElementById('stab-batting').classList.remove('hidden');
  document.getElementById('stab-bowling').classList.add('hidden');

  // Update tab labels
  const tabs = document.querySelectorAll('.stab-btn');
  if (tabs[0]) tabs[0].textContent = 'Points';
  if (tabs[1]) tabs[1].textContent = 'Errors';

  document.getElementById('statsDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
};

loadAll();
</script>
