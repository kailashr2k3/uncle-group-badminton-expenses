<!doctype html>

  <title>Uncle Group — Cricket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    /* wizard step states */
    .step-dot { width:8px; height:8px; border-radius:50%; transition:all .3s; }
    .step-dot.done    { background:#16a34a; }
    .step-dot.active  { background:#1d4ed8; width:24px; border-radius:4px; }
    .step-dot.pending { background:#e5e7eb; }
    /* ball display */
    .ball { width:36px; height:36px; border-radius:50%; border:2px solid transparent; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; flex-shrink:0; }
    /* modals */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:60; padding:1rem; }
    /* collapsible match card */
    .match-card summary::-webkit-details-marker { display:none; }
    /* run buttons */
    .run-btn { border-radius:12px; padding:10px 0; font-weight:600; font-size:13px; transition:all .15s; active:scale(.95); }
    /* tab active */
    .ctab-active { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
  </style>
</head>

// ── Public: load recent matches ───────────────────────────
// ── Match pagination state ────────────────────────────────
const MATCH_PAGE = { all: [], page: 1, pageSize: 5, isAdmin: false };

function renderMatchPage() {
  const list  = document.getElementById('recentMatchesList');
  const info  = document.getElementById('matchPageInfo');
  const prev  = document.getElementById('matchPrev');
  const next  = document.getElementById('matchNext');
  if (!list) return;

  const data   = MATCH_PAGE.all;
  const total  = data.length;
  const pages  = Math.max(1, Math.ceil(total / MATCH_PAGE.pageSize));
  MATCH_PAGE.page = Math.min(Math.max(1, MATCH_PAGE.page), pages);
  const start  = (MATCH_PAGE.page - 1) * MATCH_PAGE.pageSize;
  const slice  = data.slice(start, start + MATCH_PAGE.pageSize);

  if (info) info.textContent = `${MATCH_PAGE.page} / ${pages}`;
  if (prev) prev.disabled = MATCH_PAGE.page <= 1;
  if (next) next.disabled = MATCH_PAGE.page >= pages;

  if (!slice.length) {
    list.innerHTML = '<p class="text-sm text-gray-400">No matches yet.</p>';
    return;
  }

  const isAdmin = MATCH_PAGE.isAdmin;

  list.innerHTML = slice.map(m => {
    const isComplete  = m.status === 'complete';
    const isAbandoned = m.status === 'abandoned';
    const isProgress  = !isComplete && !isAbandoned;

    const statusBadge = isComplete
      ? `<span class="font-semibold text-green-700">🏆 ${m.winner_team} won</span>`
      : isAbandoned
        ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">Abandoned</span>`
        : `<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">In progress</span>`;

    const score1 = isComplete ? `${m.innings1_net ?? '—'}/${m.innings1_wickets ?? 0}W` : '—';
    const score2 = isComplete ? `${m.innings2_net ?? '—'}/${m.innings2_wickets ?? 0}W` : '—';

    const adminActions = (isAdmin && isProgress) ? `
      <div class="flex gap-2 mt-3">
        <button onclick="window.resumeMatch('${m.id}')"
          class="flex-1 text-xs bg-green-700 text-white rounded-xl py-2 font-semibold hover:bg-green-800">
          ▶ Resume
        </button>
        <button onclick="window.abandonMatch('${m.id}')"
          class="flex-1 text-xs bg-red-50 text-red-600 border border-red-200 rounded-xl py-2 font-medium hover:bg-red-100">
          ✕ Abandon
        </button>
      </div>` : '';

    return `<details class="match-card bg-white rounded-2xl shadow overflow-hidden ${isAbandoned?'opacity-50':''}">
      <summary class="p-4 cursor-pointer list-none">
        <div class="flex items-center justify-between">
          <div>
            <div class="font-semibold text-sm">${m.team1_name} vs ${m.team2_name}</div>
            <div class="text-xs text-gray-400 mt-0.5">${m.date} · ${m.overs} overs</div>
          </div>
          <div class="text-right">${statusBadge}</div>
        </div>
      </summary>
      <div class="px-4 pb-4 border-t border-gray-100 pt-3">
        ${isComplete ? `<div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-500 mb-1">${m.team1_name}</div>
            <div class="text-xl font-bold">${score1}</div>
            <div class="text-xs text-gray-400">${m.overs} overs</div>
          </div>
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <div class="text-xs text-gray-500 mb-1">${m.team2_name}</div>
            <div class="text-xl font-bold">${score2}</div>
            <div class="text-xs text-gray-400">${m.overs} overs</div>
          </div>
        </div>` : `<p class="text-xs text-gray-400">Status: ${m.status} · ${m.overs} overs · −${m.wicket_penalty} per wicket</p>`}
        ${adminActions}
        <div class="mt-3">
          <a href="cricket-stats.html" class="text-xs text-blue-600 hover:underline">View player stats →</a>
        </div>
      </div>
    </details>`;
  }).join('');
}

async function loadRecentMatches(isAdmin = false) {
  MATCH_PAGE.isAdmin = isAdmin;
  const { data, error } = await sb
    .from('cricket_match_summary')
    .select('*')
    .order('date', { ascending: false });

  if (error) {
    const list = document.getElementById('recentMatchesList');
    if (list) list.innerHTML = '<p class="text-sm text-gray-400">Could not load matches.</p>';
    return;
  }

  // Admins see all incl. abandoned; public sees only non-abandoned
  MATCH_PAGE.all  = isAdmin ? (data||[]) : (data||[]).filter(m => m.status !== 'abandoned');
  MATCH_PAGE.page = 1;
  renderMatchPage();
}

// Wire pager buttons (runs after DOM ready)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('matchPrev')?.addEventListener('click', () => {
    if (MATCH_PAGE.page > 1) { MATCH_PAGE.page--; renderMatchPage(); }
  });
  document.getElementById('matchNext')?.addEventListener('click', () => {
    MATCH_PAGE.page++; renderMatchPage();
  });
});

// ── Wizard state ──────────────────────────────────────────
const W = {
  step: 0,
  matchId: null, sessionId: null,
  team1: '', team2: '', overs: 6, penalty: 5,
  squad1: [], squad2: [],
  // scoring
  innings: 1,
  score: 0, penalties: 0, wickets: 0,
  overNum: 1, balls: [],
  allOvers: [],
  batsmanStats: {}, // { name: { runs, balls, wickets } }
  bowlerStats:  {}, // { name: { overs, runs, wickets } }
  pairHistory:  [], // [{ overNum, p1, p2 }]
  currentPair: null, striker: 0,
  overJustDone: false,
  needsBowlerChange: false,
  lastBowler: null,
  lastSnap: null,
  // innings 1 summary (saved before innings 2)
  inn1: null,
};

const STEPS = ['setup','squads','toss','innings1','break','innings2','result'];
const STEP_LABELS = ['Match setup','Build squads','Toss & order','Innings 1','Innings break','Innings 2','Result'];

function setStep(n) {
  W.step = n;
  STEPS.forEach((_, i) => {
    const dot = document.getElementById(`dot${i}`);
    if (!dot) return;
    dot.className = 'step-dot ' + (i < n ? 'done' : i === n ? 'active' : 'pending');
  });
  document.getElementById('wizardStepLabel').textContent = `${STEP_LABELS[n]} (${n+1}/${STEPS.length})`;
  renderStep();
}

function snap() {
  W.lastSnap = {
    score: W.score, penalties: W.penalties, wickets: W.wickets,
    overNum: W.overNum, balls: [...W.balls], allOvers: [...W.allOvers],
    batsmanStats: JSON.parse(JSON.stringify(W.batsmanStats)),
    bowlerStats:  JSON.parse(JSON.stringify(W.bowlerStats)),
    pairHistory:  [...W.pairHistory],
    currentPair: W.currentPair ? {...W.currentPair} : null,
    striker: W.striker, overJustDone: W.overJustDone,
  };
}

function restoreSnap() {
  if (!W.lastSnap) return;
  const s = W.lastSnap;
  W.score=s.score; W.penalties=s.penalties; W.wickets=s.wickets;
  W.overNum=s.overNum; W.balls=[...s.balls]; W.allOvers=[...s.allOvers];
  W.batsmanStats=JSON.parse(JSON.stringify(s.batsmanStats));
  W.bowlerStats=JSON.parse(JSON.stringify(s.bowlerStats));
  W.pairHistory=[...s.pairHistory];
  W.currentPair=s.currentPair?{...s.currentPair}:null;
  W.striker=s.striker; W.overJustDone=s.overJustDone;
  W.lastSnap=null;
}

// batting/fielding squads depending on innings
function battingSquad()  { return W.innings===1 ? W.squad1 : W.squad2; }
function fieldingSquad() { return W.innings===1 ? W.squad2 : W.squad1; }
function battingTeam()   { return W.innings===1 ? W.team1  : W.team2;  }
function fieldingTeam()  { return W.innings===1 ? W.team2  : W.team1;  }

function netScore() { return W.score - W.penalties; }

// ── Step renderers ────────────────────────────────────────
function renderStep() {
  const el = document.getElementById('wizardStep');
  const s  = STEPS[W.step];
  if (s === 'setup')    el.innerHTML = tmplSetup();
  else if (s === 'squads')  el.innerHTML = tmplSquads();
  else if (s === 'toss')     el.innerHTML = tmplToss();
  else if (s === 'innings1' || s === 'innings2') el.innerHTML = tmplScoring();
  else if (s === 'break')   el.innerHTML = tmplBreak();
  else if (s === 'result')  el.innerHTML = tmplResult();
  wireStep(s);
}

// ─── Squads template — tile bucket UI ────────────────────
// Shows all registered players as tappable tiles.
// Tap once → Team 1 (blue). Tap again → Team 2 (green). Tap again → unassigned.
// Guests can be added via a text input.
function tmplSquads() {
  const all = W.registeredPlayers || [];
  const sq1ids = new Set(W.squad1.map(p=>p.id||p.name));
  const sq2ids = new Set(W.squad2.map(p=>p.id||p.name));

  // Store all players in a registry so onclick only needs a safe integer index
  // This avoids JSON.stringify inside HTML attributes which breaks on quotes/special chars
  window.__tileRegistry = window.__tileRegistry || {};
  let __tileIdx = 0;
  const tileFor = (p) => {
    const key = p.id || p.name;
    const inT1 = sq1ids.has(key);
    const inT2 = sq2ids.has(key);
    const cls = inT1
      ? 'bg-blue-600 text-white border-blue-600'
      : inT2
        ? 'bg-emerald-600 text-white border-emerald-600'
        : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300';
    const badge = inT1
      ? `<span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-white text-blue-600 text-xs flex items-center justify-center font-bold border border-blue-200">1</span>`
      : inT2
        ? `<span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-white text-emerald-600 text-xs flex items-center justify-center font-bold border border-emerald-200">2</span>`
        : '';
    // safe integer index — no strings in the onclick attribute
    const tidx = __tileIdx++;
    window.__tileRegistry[tidx] = { key, name: p.name, id: p.id || null };
    return `<div onclick="window.cycleTileByIdx(${tidx})"
      class="relative cursor-pointer border-2 rounded-xl px-3 py-2 text-xs font-medium text-center transition-all select-none ${cls}">
      ${p.name}${!p.id ? '<br><span class="opacity-60" style="font-size:10px">guest</span>' : ''}
      ${badge}
    </div>`;
  };

  const allTiles = all.map(tileFor).join('');
  const guestTiles = W.squad1.filter(p=>!p.id).map(tileFor).join('') +
                     W.squad2.filter(p=>!p.id).map(p => {
                       const key = p.name;
                       const inT1 = sq1ids.has(key);
                       const inT2 = sq2ids.has(key);
                       if (!inT1 && !inT2) return '';
                       return tileFor(p);
                     }).join('');

  const legend = `<div class="flex gap-3 text-xs">
    <span class="flex items-center gap-1.5"><span class="w-4 h-4 rounded bg-blue-600 flex items-center justify-center text-white font-bold" style="font-size:9px">1</span>${W.team1} (${W.squad1.length})</span>
    <span class="flex items-center gap-1.5"><span class="w-4 h-4 rounded bg-emerald-600 flex items-center justify-center text-white font-bold" style="font-size:9px">2</span>${W.team2} (${W.squad2.length})</span>
    <span class="flex items-center gap-1.5"><span class="w-4 h-4 rounded border-2 border-gray-200"></span>Unassigned</span>
  </div>`;

  const canLock = W.squad1.length >= 2 && W.squad2.length >= 2;

  return `<div class="bg-white rounded-2xl shadow p-5 flex flex-col gap-4">
    <div class="bg-gray-800 rounded-xl p-3 text-white text-sm">
      <div class="font-bold">${W.team1} vs ${W.team2}</div>
      <div class="text-xs text-gray-400 mt-0.5">${W.overs} overs · −${W.penalty} per wicket</div>
    </div>

    <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-xs text-blue-700">
      Tap a player once to add to <strong>${W.team1}</strong> (🟦 1),
      tap again to move to <strong>${W.team2}</strong> (🟩 2),
      tap once more to remove.
    </div>

    ${legend}

    <!-- Player tiles -->
    <div>
      <div class="text-xs font-medium text-gray-500 mb-2">Registered players</div>
      <div class="grid grid-cols-3 gap-2">
        ${allTiles || '<span class="text-xs text-gray-400 col-span-3">No players loaded</span>'}
      </div>
    </div>

    <!-- Guest add -->
    <div>
      <div class="text-xs font-medium text-gray-500 mb-1.5">Add guest player</div>
      <div class="flex gap-2">
        <input id="guestNameInput" placeholder="Guest name…"
          class="flex-1 border rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-green-500"/>
        <button onclick="window.addGuestTile()" class="px-3 bg-gray-600 text-white rounded-lg text-xs font-semibold hover:bg-gray-700">Add</button>
      </div>
      ${(W.squad1.filter(p=>!p.id).length + W.squad2.filter(p=>!p.id).length) > 0 ? `
      <div class="grid grid-cols-3 gap-2 mt-2">
        ${[...W.squad1,...W.squad2].filter(p=>!p.id).filter((p,i,a)=>a.findIndex(x=>x.name===p.name)===i).map(tileFor).join('')}
      </div>` : ''}
    </div>

    <!-- Team summary strips -->
    <div class="grid grid-cols-2 gap-2">
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-2.5">
        <div class="text-xs font-bold text-blue-700 mb-1">${W.team1} (${W.squad1.length})</div>

// ─── Scoring template ─────────────────────────────────────
function tmplScoring() {
  const isChase = W.innings === 2;
  const legalBalls = W.balls.filter(b=>!b.extra).length;
  const net = netScore();
  const target = isChase && W.inn1 ? W.inn1.net + 1 : null;
  const needed = target !== null ? target - net : null;
  const totalBallsDone = (W.overNum-1)*6 + legalBalls;
  const ballsLeft = W.overs*6 - totalBallsDone;
  const inningsOver = W.overNum > W.overs;
  const heroColor = isChase ? 'bg-green-800' : 'bg-blue-900';

  // ball dots (current over)
  const ballDots = [...W.balls, ...Array(Math.max(0,6-W.balls.length)).fill(null)].map(b => {
    if (!b) return `<div class="ball" style="background:#f3f4f6;border-color:#e5e7eb;color:#d1d5db"></div>`;
    const cfg = {
      run0:  ['#f3f4f6','#e5e7eb','#4b5563','0'],
      run1:  ['#EFF6FF','#93c5fd','#1d4ed8','1'],
      run2:  ['#f0fdf4','#86efac','#15803d','2'],
      run4:  ['#fffbeb','#fcd34d','#92400e','4'],
      run6:  ['#faf5ff','#c4b5fd','#5b21b6','6'],
      wd:    ['#fef2f2','#fca5a5','#991b1b','Wd'],
      nb:    ['#fff7ed','#fdba74','#9a3412','NB'],
      wkt:   ['#1f2937','#1f2937','#fff','W−'],
    }[b.type] || ['#f3f4f6','#e5e7eb','#111','?'];
    return `<div class="ball" style="background:${cfg[0]};border-color:${cfg[1]};color:${cfg[2]}">${cfg[3]}</div>`;
  }).join('');

  // batsmen rows
  const pair = W.currentPair;
  const batsmenHtml = pair ? [pair.p1,pair.p2].map((player,i)=>{ const name = player?.name || '?';
    const st = W.batsmanStats[name]||{runs:0,balls:0,wickets:0};
    return `<div onclick="window.setStriker(${i})" class="flex items-center justify-between px-3 py-2.5 border-t border-gray-50 cursor-pointer ${i===W.striker?'bg-blue-50':''}">
      <div class="flex items-center gap-2">
        ${i===W.striker?'<span class="text-yellow-500">★</span>':''}
        <span class="text-sm font-medium">${name}</span>
        ${st.wickets>0?`<span class="text-xs bg-orange-100 text-orange-600 rounded-full px-1.5">${st.wickets}W</span>`:''}
      </div>
      <span class="text-sm"><span class="font-bold text-blue-700">${st.runs}</span><span class="text-gray-400 text-xs ml-1">(${st.balls}b)</span></span>
    </div>`;
  }).join('') : '<div class="px-3 py-2 text-xs text-gray-400">No pair selected</div>';

  // overs log
  const oversLog = W.allOvers.length ? W.allOvers.map(o=>`
    <div class="flex justify-between text-xs py-1 border-b border-gray-100 last:border-0">
      <span class="text-gray-500">Ov ${o.num} — <span class="font-medium text-gray-700">${o.bowler}</span></span>
      <span class="font-semibold">${o.runs}r</span>
    </div>`).join('') : '';

  // batsman summary
  const batSummary = Object.entries(W.batsmanStats).map(([name,st])=>`
    <div class="flex justify-between text-xs py-1 border-b border-gray-100 last:border-0">
      <span class="font-medium">${name}</span>
      <span><span class="font-bold text-blue-700">${st.runs}</span><span class="text-gray-400"> (${st.balls}b)</span>${st.wickets>0?`<span class="text-orange-500 ml-1">${st.wickets}W</span>`:''}</span>
    </div>`).join('');

  // bowler options — fieldingSquad() returns [{id,name}]; use .name throughout
  const bowlerOpts = fieldingSquad().map(p=>{
    const name = p.name;
    const st   = W.bowlerStats[name];
    return `<option value="${name}" ${name===W.currentBowler?'selected':''}>${name}${st?`  ·  ${st.overs}ov ${st.runs}r ${st.wickets}w`:''}`;
  }).join('');

  return `<div class="bg-white rounded-2xl shadow overflow-hidden">
    <!-- hero -->
    <div class="${heroColor} p-5 text-white text-center">
      <div class="text-xs font-semibold opacity-70 mb-1">${battingTeam()} batting</div>
      <div class="text-5xl font-bold leading-none">${net}<span class="text-2xl opacity-60"> (${W.wickets}W)</span></div>
      <div class="text-xs opacity-70 mt-1">Over ${W.overNum-1}.${legalBalls} of ${W.overs} · Gross ${W.score} − ${W.penalties} pen</div>
      ${isChase&&needed!==null?`<div class="mt-2 inline-block bg-white bg-opacity-20 rounded-full px-3 py-1 text-xs font-semibold">Need ${Math.max(0,needed)} off ${Math.max(0,ballsLeft)} balls</div>`:''}
    </div>

    <div class="p-4 flex flex-col gap-3">
      <!-- between-over prompt — chip selectors for bowler + pair -->
      ${W.overJustDone&&!inningsOver?`<div class="bg-teal-50 border border-teal-200 rounded-xl p-4 flex flex-col gap-4">
        <div class="text-sm font-semibold text-teal-800">Over ${W.overNum-1} done — pick bowler & pair</div>

        <!-- Bowler chips -->
        <div>
          <div class="text-xs font-medium text-gray-600 mb-1.5">
            Bowler — ${fieldingTeam()}
            ${W.needsBowlerChange?'<span class="text-red-500 ml-1 font-semibold">⚠ must change</span>':''}
          </div>
          <div class="flex flex-wrap gap-2">
            ${fieldingSquad().map((p,i)=>{
              const name=p.name;
              const isSelected = name===W.currentBowler;
              const isLast = name===W.lastBowler;
              const st = W.bowlerStats[name];
              const statStr = st ? st.overs+'ov '+st.wickets+'w' : '';
              const cls = isLast
                ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'
                : isSelected
                  ? 'bg-blue-600 text-white border-blue-600'
                  : 'bg-white text-gray-700 border-gray-300 hover:border-blue-400 hover:bg-blue-50';
              const tidx = 1000+i;
              window.__tileRegistry = window.__tileRegistry||{};
              window.__tileRegistry[tidx] = { name, isLast };
              return '<button onclick="window.selectBowler('+tidx+')" '+(isLast?'disabled':'')+' class="text-xs px-3 py-1.5 rounded-full border-2 font-medium transition-all '+cls+'">'+name+(isLast?' ✗':'')+(statStr?' · '+statStr:'')+'</button>';
            }).join('')}
          </div>
          ${W.needsBowlerChange?'<p class="text-xs text-red-500 mt-1">Same bowler two overs in a row not allowed.</p>':''}
        </div>

        <!-- Batting pair chips -->
        <div>
          <div class="text-xs font-medium text-gray-600 mb-1.5">Batting pair — ${battingTeam()}</div>
          <div class="flex flex-wrap gap-2">
            ${battingSquad().map((p,i)=>{
              const name=p.name;
              const isP1 = pair?.p1?.name===name;
              const isP2 = pair?.p2?.name===name;
              const cls = isP1
                ? 'bg-blue-600 text-white border-blue-600'
                : isP2
                  ? 'bg-emerald-600 text-white border-emerald-600'
                  : 'bg-white text-gray-700 border-gray-300 hover:border-gray-400';
              const label = isP1 ? name+' ★' : isP2 ? name+' ·' : name;
              const tidx = 2000+i;
              window.__tileRegistry[tidx] = { name, id: p.id||null };
              return '<button onclick="window.cyclePairChip('+tidx+')" class="text-xs px-3 py-1.5 rounded-full border-2 font-medium transition-all '+cls+'">'+label+'</button>';
            }).join('')}
          </div>
          <div class="text-xs text-gray-400 mt-1">Tap to set striker (★) → non-striker (·) → remove</div>
        </div>

        <button onclick="window.keepPairAndBowler()"
          class="w-full text-sm bg-teal-600 text-white rounded-xl py-2.5 font-semibold hover:bg-teal-700 disabled:opacity-40 disabled:cursor-not-allowed"
          ${W.needsBowlerChange||!pair?.p1||!pair?.p2?'disabled':''}>
          ✓ Start Over ${W.overNum}
        </button>
      </div>`:''}

      <!-- current over -->
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs font-medium text-gray-500 mb-2">Over ${W.overNum} — ${legalBalls}/6</div>
        <div class="flex gap-1.5 flex-wrap">${ballDots}</div>
        ${W.balls.some(b=>b.type==='wkt')?`<div class="text-xs text-orange-600 mt-1.5 font-medium">−${W.balls.filter(b=>b.type==='wkt').length*W.penalty} runs penalty this over</div>`:''}
      </div>

      <!-- batsmen -->
      <div class="bg-white border border-gray-100 rounded-xl overflow-hidden">
        <div class="flex items-center justify-between px-3 pt-2 pb-1">
          <span class="text-xs font-medium text-gray-400">At crease — tap to set striker</span>
          <button onclick="window.openPairModal(!!window.W.currentPair)" class="text-xs text-blue-500 hover:text-blue-700">Change pair</button>
        </div>
        ${batsmenHtml}
      </div>

      <!-- bowler chips (mid-over) -->
      ${!W.overJustDone?`<div>
        <div class="text-xs font-medium text-gray-500 mb-1.5">Bowler — ${fieldingTeam()}</div>
        <div class="flex flex-wrap gap-1.5">
          ${fieldingSquad().map((p,i)=>{
            const name=p.name; const st=W.bowlerStats[name];
            const sel=name===W.currentBowler;
            const cls=sel?'bg-blue-600 text-white border-blue-600':'bg-white text-gray-600 border-gray-200 hover:border-blue-300';
            const tidx=3000+i; window.__tileRegistry=window.__tileRegistry||{}; window.__tileRegistry[tidx]={name};
            return '<button onclick="window.selectBowlerMid('+tidx+')" class="text-xs px-2.5 py-1 rounded-full border font-medium '+cls+'">'+name+(st?' '+st.overs+'ov':'')+'</button>';
          }).join('')}
        </div>
      </div>`:''}

      <!-- run buttons -->
      <div class="grid grid-cols-3 gap-2">
        ${[['0','bg-gray-100 text-gray-700','run',0],
           ['1 run','bg-blue-50 text-blue-700 border border-blue-300','run',1],
           ['2 runs','bg-emerald-50 text-emerald-700 border border-emerald-300','run',2],
           ['4 runs','bg-amber-50 text-amber-700 border border-amber-400','run',4],
           ['6 runs','bg-purple-50 text-purple-700 border border-purple-400','run',6],
           ['🏏 Wicket','bg-orange-100 text-orange-700 border border-orange-300','wkt',0],
           ['Wide +1','bg-red-50 text-red-700 border border-red-300','wd',0],
           ['No Ball +1','bg-red-50 text-red-700 border border-red-300','nb',0],
           ['↩ Undo','bg-white text-gray-500 border border-gray-200','undo',0]
        ].map(([lbl,cls,act,val])=>`
          <button onclick="window.recordBall('${act}',${val})" class="run-btn ${cls} ${act==='undo'&&!W.lastSnap?'opacity-40 cursor-not-allowed':''}">${lbl}</button>`
        ).join('')}
      </div>

      <!-- summaries -->
      ${batSummary?`<div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs font-medium text-gray-500 mb-1.5">Batting — ${battingTeam()}</div>${batSummary}</div>`:''}
      ${oversLog?`<div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs font-medium text-gray-500 mb-1.5">Overs</div>${oversLog}</div>`:''}

      ${inningsOver?`<div class="bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2 text-xs text-emerald-700 text-center font-medium">${W.overs} overs complete</div>`:''}

      <button id="finishInningsBtn" class="w-full bg-green-900 text-white rounded-xl py-3 font-semibold hover:bg-green-950">
        ${W.innings===1?'Complete Innings →':'Complete Match →'}
      </button>
    </div>
  </div>`;
}

// ─── Result template ──────────────────────────────────────
function tmplResult() {
  const inn1 = W.inn1;
  const inn2Net = netScore();
  const won = inn2Net >= inn1.net + 1;
  const winner = won ? W.team2 : W.team1;
  const margin = Math.abs(inn2Net - inn1.net);

  const scoreBlock = (team, net, wickets, ovs, penalties, batsmanStats, bowlerStats) => `
    <div class="bg-gray-50 rounded-xl p-3">
      <div class="flex justify-between items-baseline mb-2">
        <span class="text-xs font-bold text-gray-600 uppercase tracking-wide">${team}</span>
        <span class="text-sm font-bold">${net} (${wickets}W) ${ovs}ov</span>
      </div>
      ${penalties>0?`<div class="text-xs text-orange-600 mb-2">Penalty deducted: −${penalties}</div>`:''}
      ${Object.entries(batsmanStats||{}).map(([n,s])=>`
        <div class="flex justify-between text-xs py-1 border-b border-gray-100 last:border-0">
          <span class="font-medium">${n}</span>
          <span><span class="font-bold text-blue-700">${s.runs}</span><span class="text-gray-400"> (${s.balls}b)</span>${s.wickets>0?`<span class="text-orange-500 ml-1">${s.wickets}W</span>`:''}</span>
        </div>`).join('')}
      ${Object.keys(bowlerStats||{}).length?`
        <div class="mt-2 pt-2 border-t border-gray-200">
          <div class="grid grid-cols-4 text-xs text-gray-400 font-medium mb-1">
            <span class="col-span-2">Bowler</span><span class="text-right">Ov</span><span class="text-right">R-W</span>
          </div>
          ${Object.entries(bowlerStats).map(([n,s])=>`
            <div class="grid grid-cols-4 text-xs py-0.5">
              <span class="col-span-2">${n}</span>
              <span class="text-right text-gray-600">${s.overs}</span>
              <span class="text-right font-semibold">${s.runs}-${s.wickets}</span>
            </div>`).join('')}
        </div>`:''}</div>`;

  return `<div class="flex flex-col gap-4">
    <div class="bg-green-700 rounded-2xl p-5 text-white text-center">
      <div class="text-3xl mb-1">🏆</div>
      <div class="text-xl font-bold">${winner} won!</div>
      <div class="text-green-200 text-sm mt-1">by ${margin} run${margin!==1?'s':''}</div>
    </div>
    ${scoreBlock(W.team1, inn1.net, inn1.wickets, inn1.overNum, inn1.penalties, inn1.batsmanStats, W.batsmanStats)}
    ${scoreBlock(W.team2, inn2Net, W.wickets, Math.min(W.overNum,W.overs), W.penalties, W.batsmanStats, inn1.bowlerStats)}
    <button id="newMatchBtn2" class="w-full bg-green-700 text-white rounded-xl py-3 font-semibold hover:bg-green-800">New Match</button>
    <a href="cricket-stats.html" class="w-full block text-center text-xs text-blue-600 hover:underline py-1">View all player stats →</a>
  </div>`;
}

// ── Wire step interactivity ───────────────────────────────
function wireStep(step) {
  if (step==='setup') {
    document.getElementById('setupNextBtn').onclick = async () => {
      W.team1   = document.getElementById('setupT1').value.trim();
      W.team2   = document.getElementById('setupT2').value.trim();
      W.date    = document.getElementById('setupDate').value;
      if (!W.team1||!W.team2) return alert('Enter both team names');
      setStep(1);
    };
  }
  if (step==='squads') {
    document.getElementById('squadsNextBtn').onclick = async () => {
      if (W.squad1.length<2||W.squad2.length<2) return;
      // create session + match in Supabase
      const { data:sess } = await sb.from('cricket_sessions').insert({ date:W.date, notes:'' }).select('id').single();
      W.sessionId = sess.id;
      const { data:match } = await sb.from('cricket_matches').insert({
        session_id:W.sessionId, team1_name:W.team1, team2_name:W.team2,
        overs:W.overs, wicket_penalty:W.penalty, status:'innings1'
      }).select('id').single();
      W.matchId = match.id;
      // save squads
      const sq = [
        ...W.squad1.map((p,i)=>({ match_id:W.matchId, team:1, player_id:p.id||null, guest_name:p.id?null:p.name, sort_order:i })),
        ...W.squad2.map((p,i)=>({ match_id:W.matchId, team:2, player_id:p.id||null, guest_name:p.id?null:p.name, sort_order:i })),
      ];
      await sb.from('cricket_squads').insert(sq);
      sessionStorage.setItem('activeCricketMatchId', W.matchId);
      // reset scoring state
      resetScoringState();
      W.innings = 1;
      W.currentBowler = fieldingSquad()[0]?.name || '';
      document.getElementById('wizardContainer').classList.remove('hidden');
      setStep(2); // toss ✓
    };
  }
  if (step==='toss') {
    document.getElementById('tossConfirmBtn').onclick = () => {
      const batFirst = document.querySelector('input[name="tossWinner"]:checked')?.value;
      if (!batFirst) return alert('Select who bats first');
      if (batFirst === '2') {
        // swap: team2 bats first = team2 is now innings1 batting
        // We swap squad1/squad2 and team1/team2 labels so innings1 always = first bat
        [W.squad1, W.squad2] = [W.squad2, W.squad1];
        [W.team1, W.team2]   = [W.team2, W.team1];
      }
      resetScoringState();
      W.innings = 1;
      W.currentBowler = fieldingSquad()[0]?.name || '';
      setStep(3); // innings1 ✓
      openPairModal(false);
    };
  }
  if (step==='innings1'||step==='innings2') {
    document.getElementById('finishInningsBtn').onclick = () => finishInnings();
    // sync bowler select
    const sel = document.getElementById('bowlerSel');
    if (sel) sel.value = W.currentBowler;
  }
  if (step==='break') {
    document.getElementById('startChaseBtn').onclick = () => {
      resetScoringState();
      W.innings = 2;
      W.currentBowler = fieldingSquad()[0]?.name || '';
      sb.from('cricket_matches').update({ status:'innings2' }).eq('id',W.matchId);
      setStep(5);
      openPairModal(false);
    };
  }
  if (step==='result') {
    document.getElementById('newMatchBtn2')?.addEventListener('click', resetWizard);
  }
}

function resetScoringState() {
  W.score=0; W.penalties=0; W.wickets=0;
  W.overNum=1; W.balls=[]; W.allOvers=[];
  W.batsmanStats={}; W.bowlerStats={};
  W.pairHistory=[]; W.currentPair=null;
  W.striker=0; W.overJustDone=false; W.needsBowlerChange=false; W.lastBowler=null; W.lastSnap=null; W.pendingBalls=[];
}

function resetWizard() {
  Object.assign(W, {
    step:0, matchId:null, sessionId:null,
    team1:'', team2:'', overs:6, penalty:5,
    squad1:[], squad2:[], innings:1, inn1:null,
  });
  resetScoringState();
  sessionStorage.removeItem('activeCricketMatchId');
  document.getElementById('wizardContainer').classList.add('hidden');
  loadRecentMatches();
}

// ── Global helpers (called from inline onclick) ───────────
// openPairModal / keepPair / recordBall are defined as window.X = ()=>{}
// directly where they appear below — no need to alias here.
window.W       = W;
window.setStep = setStep;
window.adj = (key, delta) => {
  if (key==='overs')   W.overs   = Math.max(1, Math.min(50, W.overs+delta));
  if (key==='penalty') W.penalty = Math.max(0, W.penalty+delta);
  document.getElementById(key+'Val').textContent = W[key];
};
window.setStriker = (i) => { W.striker=i; renderStep(); };

// Load registered players from DB into W.registeredPlayers
async function loadRegisteredPlayers() {
  const { data } = await sb.from('players').select('id,name').eq('is_active', true).order('name');
  W.registeredPlayers = data || [];
}

// Cycle a player tile: unassigned → team1 → team2 → unassigned
// Uses integer index to avoid any strings in HTML onclick attributes
window.cycleTileByIdx = (tidx) => {
  const entry = window.__tileRegistry && window.__tileRegistry[tidx];
  if (!entry) return;
  const { key, name, id } = entry;
  const inT1 = W.squad1.some(p=>(p.id||p.name)===key);
  const inT2 = W.squad2.some(p=>(p.id||p.name)===key);
  if (!inT1 && !inT2) {
    W.squad1.push({ id: id||null, name });
  } else if (inT1) {
    W.squad1 = W.squad1.filter(p=>(p.id||p.name)!==key);
    W.squad2.push({ id: id||null, name });
  } else {
    W.squad2 = W.squad2.filter(p=>(p.id||p.name)!==key);
  }
  renderStep();
};

// Add a guest player (starts unassigned, first tap goes to team 1)
window.addGuestTile = () => {
  const input = document.getElementById('guestNameInput');
  const name  = input?.value?.trim();
  if (!name) return;
  const already = [...W.squad1,...W.squad2].some(p=>p.name===name);
  const inPool  = (W.registeredPlayers||[]).some(p=>p.name===name);
  if (already || inPool) { input.value=''; return; }
  // Add as guest to team 1 immediately
  W.squad1.push({ id: null, name });
  input.value='';
  renderStep();
};

// ── Pair modal ────────────────────────────────────────────
window.openPairModal = (allowKeep) => {

  const p2sel = document.getElementById('pairP2');

  p1sel.innerHTML = opts;

    if (i1>=0) p1sel.value=i1; if (i2>=0) p2sel.value=i2;
  } else if (sq.length >= 2) {
    p1sel.value=0; p2sel.value=1;

  document.getElementById('pairModalTitle').textContent = allowKeep ? `Over ${W.overNum} — change pair?` : `Over ${W.overNum} — select pair`;
  document.getElementById('pairModalSub').textContent   = battingTeam() + ' batting';

// ── Bowler chip selector (mid-over panel) ─────────────────

// ── Pair chip cycling (between-over panel) ────────────────
// Tap unassigned → striker (★) → non-striker (·) → unassigned
window.cyclePairChip = (tidx) => {
  const entry = window.__tileRegistry[tidx];
  if (!entry) return;
  const { name, id } = entry;
  const player = { id: id||null, name };
  const isP1 = W.currentPair?.p1?.name === name;
  const isP2 = W.currentPair?.p2?.name === name;

  if (!isP1 && !isP2) {
    // not in pair — add as striker if no striker, else non-striker
    if (!W.currentPair?.p1) {
      W.currentPair = { p1: player, p2: W.currentPair?.p2 || null };
    } else if (!W.currentPair?.p2) {
      W.currentPair = { p1: W.currentPair.p1, p2: player };
    } else {
      // pair full — replace striker
      W.currentPair = { p1: player, p2: W.currentPair.p2 };
    }
  } else if (isP1) {
    // is striker → promote to non-striker, clear striker
    W.currentPair = { p1: W.currentPair.p2, p2: player };
  } else {
    // is non-striker → remove
    W.currentPair = { p1: W.currentPair.p1, p2: null };
  }
  renderStep();
};
window.keepPair = () => {
  W.overJustDone = false;
  renderStep();
};

window.keepPairAndBowler = () => {
  if (W.needsBowlerChange) return; // block if same bowler
  W.overJustDone = false;
  W.needsBowlerChange = false;
  renderStep();
};

// ── Wicket modal ──────────────────────────────────────────
function openWktModal() {
  const batsmanName = W.striker===0 ? W.currentPair?.p1?.name : W.currentPair?.p2?.name;
  document.getElementById('wktPenaltyMsg').textContent = `−${W.penalty} run penalty`;
  document.getElementById('wktBowlerMsg').textContent  = `Bowler: ${W.currentBowler} gets +1 wicket`;
  document.getElementById('wktModal').classList.remove('hidden');
}
document.getElementById('wktCancelBtn').onclick = () => document.getElementById('wktModal').classList.add('hidden');
document.getElementById('wktConfirmBtn').onclick = async () => {
  document.getElementById('wktModal').classList.add('hidden');
  const batsmanName = W.striker===0 ? W.currentPair.p1?.name : W.currentPair.p2?.name;
  const newBalls = [...W.balls, { type:'wkt', runs:0, extra:false }];
  W.penalties += W.penalty;
  W.wickets++;
  W.balls = newBalls;
  // bowler gets wicket
  const bs = W.bowlerStats[W.currentBowler] || {overs:0,runs:0,wickets:0};
  W.bowlerStats[W.currentBowler] = {...bs, wickets:bs.wickets+1};
  // batsman stat
  const bt = W.batsmanStats[batsmanName] || {runs:0,balls:0,wickets:0};
  W.batsmanStats[batsmanName] = {...bt, balls:bt.balls+1, wickets:bt.wickets+1};
  // buffer wicket ball — will be saved with the over
  W.pendingBalls.push({ type:'wkt', runs:0, extra:false, batsmanName });
  const legal = newBalls.filter(b=>!b.extra).length;
  if (legal===6) await finishOver(newBalls);
  else renderStep();
};

// ── Ball recording ────────────────────────────────────────
window.recordBall = async (act, val) => {
  if (act==='undo') { restoreSnap(); renderStep(); return; }
  if (!W.currentPair || W.overJustDone) return;
  if (W.overNum > W.overs) return;
  if (act==='wkt') { snap(); openWktModal(); return; }

  snap();
  const batsmanName = W.striker===0 ? W.currentPair.p1?.name : W.currentPair.p2?.name;

  if (act==='wd'||act==='nb') {
    W.balls.push({ type:act, runs:1, extra:true });
    W.score++;
    W.pendingBalls.push({ type:act, runs:1, extra:true, batsmanName });
  } else {
    const runs = val;
    W.balls.push({ type:`run${runs}`, runs, extra:false });
    W.score += runs;
    const bt = W.batsmanStats[batsmanName]||{runs:0,balls:0,wickets:0};
    W.batsmanStats[batsmanName] = {...bt, runs:bt.runs+runs, balls:bt.balls+1};
    if (runs%2!==0) W.striker = 1-W.striker;
    W.pendingBalls.push({ type:`run${runs}`, runs, extra:false, batsmanName });
    const legal = W.balls.filter(b=>!b.extra).length;
    if (legal===6) { await finishOver(W.balls); return; }
  }
  renderStep();
};

// ── Over completion ───────────────────────────────────────
async function finishOver(balls) {
  const overRuns = balls.reduce((s,b)=>s+b.runs,0);
  const bowlerObj = [...(W.squad1||[]),...(W.squad2||[])].find(p=>p.name===W.currentBowler);

  W.allOvers.push({ num:W.overNum, bowler:W.currentBowler, balls:[...balls], runs:overRuns });
  const bs = W.bowlerStats[W.currentBowler]||{overs:0,runs:0,wickets:0};
  W.bowlerStats[W.currentBowler] = {...bs, overs:bs.overs+1, runs:bs.runs+overRuns};

  // 1. Save over to DB first, get the ID
  const { data:ovRow, error:ovErr } = await sb.from('cricket_overs').insert({
    match_id:W.matchId, innings:W.innings, over_number:W.overNum,
    bowler_id:       bowlerObj?.id || null,
    bowler_guest:    bowlerObj?.id ? null : W.currentBowler,
    striker_id:      W.currentPair?.p1?.id || null,
    non_striker_id:  W.currentPair?.p2?.id || null,
    runs_scored:overRuns,
    wickets:balls.filter(b=>b.type==='wkt').length
  }).select('id').single();
  if (ovErr) console.error('Over save failed:', ovErr);

  // 2. Save all buffered balls for this over now that we have the over id
  if (ovRow?.id && W.pendingBalls.length) {
    let legalCount = 0;
    const ballRows = W.pendingBalls.map(b => {
      const bObj = [...(W.squad1||[]),...(W.squad2||[])].find(p=>p.name===b.batsmanName);
      if (!b.extra) legalCount++;
      return {
        over_id:       ovRow.id,
        ball_number:   b.extra ? 0 : legalCount,
        batsman_id:    bObj?.id || null,
        batsman_guest: bObj?.id ? null : (b.batsmanName || null),
        runs:          b.runs,
        extra_type:    b.extra ? b.type : null,
        is_wicket:     b.type === 'wkt'
      };
    });
    const { error:ballErr } = await sb.from('cricket_balls').insert(ballRows);
    if (ballErr) console.error('Ball save failed:', ballErr);
  }
  W.pendingBalls = [];
  W.balls = [];
  W.overNum++;
  W.striker = 1-W.striker;
  W.overJustDone = true;
  W.lastBowler = W.currentBowler;
  W.needsBowlerChange = true;
  renderStep();
}

// writeBall removed — balls now buffered in W.pendingBalls and written in finishOver

// ── Abandon match ────────────────────────────────────────
window.abandonMatch = async (matchId) => {
  if (!confirm('Abandon this match? It will be hidden from public view but data is kept.')) return;
  await sb.from('cricket_matches')
    .update({ status: 'abandoned' })
    .eq('id', matchId);

// ── Resume match — reconstruct W from Supabase ────────────
// Ensure the admin panel HTML is in the DOM before resumeMatch touches it.
// This covers the case where Resume is clicked from the public matches list
// before the admin panel has been opened.
async function ensureAdminMounted() {
  if (document.getElementById('wizardContainer')) return; // already there
  const user = await getUser();
  if (!user) throw new Error('You must be signed in to resume a match.');
  renderAdminMount(user);
  // renderAdminMount is synchronous DOM injection — after it returns the
  // wizardContainer element exists. Give the browser one frame to paint.
  await new Promise(r => setTimeout(r, 0));
}

window.resumeMatch = async (matchId) => {
  const btn = event?.target;
  if (btn) { btn.textContent = 'Loading…'; btn.disabled = true; }

  try {
    await ensureAdminMounted();

    // 1. Match record
    const { data: match, error: mErr } = await sb
      .from('cricket_matches').select('*').eq('id', matchId).single();
    if (mErr || !match) throw new Error('Match not found');

    // 2. Squads
    const { data: squads } = await sb
      .from('cricket_squads')
      .select('team, player_id, guest_name, sort_order')
      .eq('match_id', matchId).order('sort_order');

    // Resolve player names via separate query (no FK join)
    const playerNameMap = {};
    const squadUUIDs = (squads||[]).filter(s=>s.player_id).map(s=>s.player_id);
    if (squadUUIDs.length) {
      const { data: pRows } = await sb.from('players').select('id,name').in('id', squadUUIDs);
      (pRows||[]).forEach(p => { playerNameMap[p.id] = p.name; });
    }

    const buildSquad = (team) => (squads||[])
      .filter(s => s.team === team)
      .map(s => s.player_id
        ? { id: s.player_id,  name: playerNameMap[s.player_id] || 'Unknown' }
        : { id: null, name: s.guest_name || 'Guest' });

    const sq1 = buildSquad(1);
    const sq2 = buildSquad(2);

    // 3. Overs (no FK join syntax)
    const { data: overs, error: ovErr } = await sb
      .from('cricket_overs')
      .select('id, innings, over_number, runs_scored, wickets, bowler_id, bowler_guest')
      .eq('match_id', matchId)
      .order('innings').order('over_number');
    if (ovErr) throw new Error('Could not load overs: ' + ovErr.message);

    // 4. Balls
    const overIds = (overs||[]).map(o => o.id);
    let balls = [];
    if (overIds.length) {
      const { data: bRows } = await sb
        .from('cricket_balls')
        .select('id, over_id, runs, extra_type, is_wicket, batsman_id, batsman_guest')
        .in('over_id', overIds);
      balls = bRows || [];
    }

    // 5. Resolve all player UUIDs (bowlers + batsmen)
    const allUUIDs = [
      ...(overs||[]).filter(o=>o.bowler_id).map(o=>o.bowler_id),
      ...balls.filter(b=>b.batsman_id).map(b=>b.batsman_id),
    ];
    const uniqueUUIDs = [...new Set(allUUIDs.filter(Boolean))];
    if (uniqueUUIDs.length) {
      const { data: pRows } = await sb.from('players').select('id,name').in('id', uniqueUUIDs);
      (pRows||[]).forEach(p => { playerNameMap[p.id] = p.name; });
    }

    const bowlerNameFor  = o => playerNameMap[o.bowler_id]  || o.bowler_guest  || 'Unknown';
    const batsmanNameFor = b => playerNameMap[b.batsman_id] || b.batsman_guest || 'Unknown';

    // 6. Rebuild innings — use DB aggregates for score (reliable),
    //    balls only for per-batsman breakdown
    const rebuildInnings = (inningsOvers) => {
      let score = 0, penalties = 0, wickets = 0;
      const batsmanStats = {}, bowlerStats = {};

      for (const ov of inningsOvers) {
        const bowlerName = bowlerNameFor(ov);
        const ovRuns = Number(ov.runs_scored || 0);
        const ovWkts = Number(ov.wickets     || 0);
        score    += ovRuns;
        penalties += ovWkts * match.wicket_penalty;
        wickets  += ovWkts;

        const bs = bowlerStats[bowlerName] || { overs:0, runs:0, wickets:0 };
        bs.overs++; bs.runs += ovRuns; bs.wickets += ovWkts;
        bowlerStats[bowlerName] = bs;

        // Per-batsman from balls (best-effort)
        for (const b of balls.filter(b2 => b2.over_id === ov.id)) {
          const bName = batsmanNameFor(b);
          const bat = batsmanStats[bName] || { runs:0, balls:0, wickets:0 };
          if (!b.extra_type) { bat.balls++; bat.runs += Number(b.runs||0); }
          if (b.is_wicket) bat.wickets++;
          batsmanStats[bName] = bat;
        }
      }

      const lastOv = inningsOvers[inningsOvers.length - 1];
      return {
        score, penalties, wickets,
        net: score - penalties, gross: score,
        overNum:    lastOv ? lastOv.over_number + 1 : 1,
        lastBowler: lastOv ? bowlerNameFor(lastOv) : null,
        batsmanStats, bowlerStats,
        allOvers: inningsOvers.map(o => ({
          num: o.over_number, bowler: bowlerNameFor(o), runs: Number(o.runs_scored||0),
        })),
      };
    };

    const inn1Overs = (overs||[]).filter(o => o.innings === 1);
    const inn2Overs = (overs||[]).filter(o => o.innings === 2);

    // 7. Populate W
    W.matchId = matchId; W.sessionId = match.session_id;
    W.team1   = match.team1_name; W.team2 = match.team2_name;
    W.overs   = match.overs; W.penalty = match.wicket_penalty;
    W.squad1  = sq1; W.squad2 = sq2;
    W.pendingBalls = [];

    const applyInningsState = (state, innings) => {
      W.innings      = innings;
      W.score        = state.score;
      W.penalties    = state.penalties;
      W.wickets      = state.wickets;
      W.overNum      = state.overNum;
      W.balls        = [];
      W.allOvers     = state.allOvers;
      W.batsmanStats = state.batsmanStats;
      W.bowlerStats  = state.bowlerStats;
      W.lastBowler   = state.lastBowler;
      W.currentBowler     = state.lastBowler || fieldingSquad()[0]?.name || '';
      W.needsBowlerChange = !!state.lastBowler;
      W.overJustDone      = state.overNum > 1;
      W.currentPair       = null;
      W.lastSnap          = null;
    };

    // STEPS = ['setup','squads','toss','innings1','break','innings2','result']
    //           0        1        2       3          4       5          6
    sessionStorage.setItem('activeCricketMatchId', matchId);
    document.getElementById('wizardContainer').classList.remove('hidden');

    if (match.status === 'setup' || match.status === 'innings1') {
      applyInningsState(rebuildInnings(inn1Overs), 1);
      W.inn1 = null;
      setStep(3); // innings1
      openPairModal(false);

    } else if (match.status === 'break') {
      // inn1 must be set BEFORE resetScoringState clears W vars
      const s1 = rebuildInnings(inn1Overs);
      W.inn1 = {
        net:       match.innings1_net     ?? s1.net,
        gross:     match.innings1_gross   ?? s1.gross,
        wickets:   match.innings1_wickets ?? s1.wickets,
        penalties: match.innings1_penalty ?? s1.penalties,
        overNum:   Math.min(s1.overNum - 1, match.overs),
        batsmanStats: s1.batsmanStats,
        bowlerStats:  s1.bowlerStats,
      };
      resetScoringState();
      W.innings       = 2;
      W.currentBowler = fieldingSquad()[0]?.name || '';
      setStep(4); // break — shows innings break screen

    } else if (match.status === 'innings2') {
      const s1 = rebuildInnings(inn1Overs);
      W.inn1 = {
        net:       match.innings1_net     ?? s1.net,
        gross:     match.innings1_gross   ?? s1.gross,
        wickets:   match.innings1_wickets ?? s1.wickets,
        penalties: match.innings1_penalty ?? s1.penalties,
        overNum:   Math.min(s1.overNum - 1, match.overs),
        batsmanStats: s1.batsmanStats,
        bowlerStats:  s1.bowlerStats,
      };
      applyInningsState(rebuildInnings(inn2Overs), 2);
      setStep(5); // innings2
      openPairModal(false);
    }

  } catch(e) {
    console.error('Resume failed:', e);
    alert('Could not resume: ' + (e.message || e));
  } finally {
    if (btn) { btn.textContent = '▶ Resume'; btn.disabled = false; }
  }
};

// ── Finish innings ────────────────────────────────────────
async function finishInnings() {
  const net = netScore();
  if (W.innings===1) {
    W.inn1 = {
      net, gross:W.score, wickets:W.wickets, penalties:W.penalties,
      overNum:Math.min(W.overNum,W.overs),
      batsmanStats:{...W.batsmanStats}, bowlerStats:{...W.bowlerStats}
    };
    await sb.from('cricket_matches').update({
      status:'break',
      innings1_gross:W.score, innings1_penalty:W.penalties,
      innings1_net:net, innings1_wickets:W.wickets
    }).eq('id',W.matchId);
    setStep(4); // break
  } else {
    const inn2Net = net;
    const won = inn2Net >= W.inn1.net + 1;
    await sb.from('cricket_matches').update({
      status:'complete',
      innings2_gross:W.score, innings2_penalty:W.penalties,
      innings2_net:inn2Net, innings2_wickets:W.wickets,
      winner_team: won ? W.team2 : W.team1
    }).eq('id',W.matchId);
    sessionStorage.removeItem('activeCricketMatchId');
    loadRecentMatches();
    setStep(6); // result
  }
}

// ── Render admin panel HTML into the mount point ──────────

          <div class="flex gap-2">

            <button id="signOutBtn"  class="text-xs px-3 py-1.5 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200">Sign out</button>
          </div>
        </div>
        <p class="text-xs text-gray-400">Signed in as <strong>${user.email}</strong></p>
      </div>
      <div id="wizardContainer" class="hidden">
        <div class="flex items-center gap-2 mb-4 px-1">
          <div id="dot0" class="step-dot active"></div>
          <div id="dot1" class="step-dot pending"></div>
          <div id="dot2" class="step-dot pending"></div>
          <div id="dot3" class="step-dot pending"></div>
          <div id="dot4" class="step-dot pending"></div>
          <div id="dot5" class="step-dot pending"></div>
          <div id="dot6" class="step-dot pending"></div>
          <span id="wizardStepLabel" class="text-xs text-gray-400 ml-2">Step 1 / 6</span>
        </div>
        <div id="wizardStep"></div>
      </div>
    </section>`;

  document.getElementById('newMatchBtn').onclick = () => {
    resetWizard();
    document.getElementById('wizardContainer').classList.remove('hidden');
    setStep(0);
  };
  document.getElementById('signOutBtn').onclick = async () => {
    await sb.auth.signOut();
    document.getElementById('adminMount').innerHTML = '';
    document.getElementById('adminToggle').textContent = 'Admin';
    adminPanelOpen = false;
    renderSignInPrompt();
  };

  // Refresh matches with admin actions visible
  loadRecentMatches(true);

  // Check if there's an in-progress match from sessionStorage
  const savedMatchId = sessionStorage.getItem('activeCricketMatchId');
  if (savedMatchId) {
    const banner = document.createElement('div');
    banner.className = 'bg-amber-50 border border-amber-200 rounded-xl p-3 mb-3 flex items-center justify-between';
    banner.innerHTML = `
      <div>
        <div class="text-xs font-semibold text-amber-800">Match in progress</div>
        <div class="text-xs text-amber-600 mt-0.5">You were scoring a match. Resume where you left off?</div>
      </div>
      <button id="quickResumeBtn" class="text-xs bg-amber-600 text-white px-3 py-1.5 rounded-lg font-medium hover:bg-amber-700 ml-3">Resume →</button>`;
    const adminSec = document.getElementById('adminSection');
    adminSec.insertBefore(banner, adminSec.firstChild);
    document.getElementById('quickResumeBtn').onclick = () => window.resumeMatch(savedMatchId);
  }
}

function renderSignInPrompt() {
  document.getElementById('adminMount').innerHTML = `
    <section>
      <div class="bg-white rounded-2xl shadow p-5 text-center mt-6">
        <div class="text-3xl mb-2">🔐</div>
        <div class="font-semibold mb-1">Admin sign-in required</div>
        <p class="text-xs text-gray-400 mb-4">Scoring App is restricted to admins only</p>
        <button id="signInBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-blue-700">Send magic link</button>
      </div>
    </section>`;
  document.getElementById('signInBtn').onclick = async () => {
    const email = prompt('Enter your admin email:');
    if (!email) return;
    const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: SITE_URL } });
    alert(error ? error.message : 'Magic link sent! Check your inbox.');
  };
}

// ── Admin toggle — auth-gate ───────────────────────────────
let adminPanelOpen = false;
document.getElementById('adminToggle').onclick = async () => {
  adminPanelOpen = !adminPanelOpen;
  const mount = document.getElementById('adminMount');

  if (!adminPanelOpen) {
    mount.innerHTML = '';
    document.getElementById('adminToggle').textContent = 'Admin';
    return;
  }

  document.getElementById('adminToggle').textContent = 'Close';
  mount.innerHTML = '<p class="text-xs text-gray-400 mt-6 text-center">Checking auth…</p>';

  const user = await getUser();
  if (user) {
    renderAdminMount(user);
    if (!W.registeredPlayers) await loadRegisteredPlayers();
  } else {
    renderSignInPrompt();
  }
};

// ── Handle magic-link callback (detectSessionInUrl) ────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && adminPanelOpen) {
    renderAdminMount(session.user);
    if (!W.registeredPlayers) await loadRegisteredPlayers();
  }
});

// ── Better error handling for loadRecentMatches ────────────
async function safeLoadRecentMatches() {
  try {
    const user = await getUser();
    await loadRecentMatches(!!user);
  } catch(e) {
    document.getElementById('recentMatchesList').innerHTML =
      '<p class="text-sm text-gray-400">Could not load matches. Run the cricket_schema.sql first.</p>';
  }
}

safeLoadRecentMatches();
</script>
</body>
</html>
